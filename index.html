<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>광양 제2 LNG터미널 증설공사 - 주요 지표 Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="data.js"></script>
<script src="photos.js"></script>
<style>
  :root {
    --bg: #f8fafc;
    --surface: #ffffff;
    --surface-2: #f1f5f9;
    --surface-3: #f8fafc;
    --border: #e2e8f0;
    --border-strong: #cbd5e1;
    --text: #0f172a;
    --text-muted: #64748b;
    --text-soft: #94a3b8;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --primary-soft: #dbeafe;
    --primary-dark: #1e40af;
    --success: #15803d;
    --success-soft: #dcfce7;
    --success-border: #86efac;
    --danger: #b91c1c;
    --danger-soft: #fee2e2;
    --danger-border: #fca5a5;
    --warning: #c2410c;
    --warning-soft: #ffedd5;
    --warning-border: #fdba74;
    --shadow-xs: 0 1px 2px rgba(15, 23, 42, 0.04);
    --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.06);
    --shadow-md: 0 4px 6px -1px rgba(15, 23, 42, 0.06), 0 2px 4px -1px rgba(15, 23, 42, 0.04);
    --radius: 8px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Pretendard','Inter','Malgun Gothic','Segoe UI',sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ====== Title bar ====== */
  .titlebar {
    background: var(--surface);
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    -webkit-app-region: drag;
    flex-shrink: 0;
  }
  .titlebar .menu { display: flex; gap: 16px; font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .titlebar .menu span { cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: background 0.15s, color 0.15s; }
  .titlebar .menu span:hover { background: var(--surface-2); color: var(--text); }
  .titlebar .title { font-size: 13px; color: var(--text); font-weight: 600; letter-spacing: -0.01em; }
  .titlebar .controls { display: flex; gap: 8px; }
  .titlebar .controls span { width: 12px; height: 12px; border-radius: 50%; background: #cbd5e1; }
  .titlebar .controls .min { background: #fbbf24; }
  .titlebar .controls .max { background: #34d399; }
  .titlebar .controls .close { background: #f87171; }

  /* ====== Main layout ====== */
  .layout { flex: 1; display: flex; min-height: 0; }

  /* ====== Activity Bar ====== */
  .activitybar {
    width: 56px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 12px;
    flex-shrink: 0;
  }
  .activitybar .ab-icon {
    width: 40px; height: 40px;
    margin-bottom: 6px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-soft);
    font-size: 20px;
    cursor: pointer;
    position: relative;
    border-radius: 8px;
    transition: background 0.15s, color 0.15s;
  }
  .activitybar .ab-icon:hover { color: var(--primary); background: var(--surface-2); }
  .activitybar .ab-icon.active { color: var(--primary); background: var(--primary-soft); }
  .activitybar .ab-icon[data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    left: 52px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--text);
    color: #fff;
    padding: 6px 10px;
    font-size: 12px;
    white-space: nowrap;
    z-index: 1000;
    border-radius: 6px;
    box-shadow: var(--shadow-md);
  }

  /* ====== Sidebar ====== */
  .sidebar {
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }
  .sidebar-header {
    height: 44px;
    padding: 0 18px;
    display: flex;
    align-items: center;
    text-transform: uppercase;
    font-size: 11px;
    color: var(--text-soft);
    letter-spacing: 0.06em;
    font-weight: 700;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-content { flex: 1; overflow-y: auto; padding: 8px 8px; }
  .menu-item {
    padding: 8px 12px;
    margin-bottom: 2px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    user-select: none;
    position: relative;
    border-radius: 6px;
    transition: background 0.15s, color 0.15s;
    font-weight: 500;
  }
  .menu-item:hover { background: var(--surface-2); }
  .menu-item.active { background: var(--primary-soft); color: var(--primary-dark); font-weight: 600; }
  .menu-item .ic { font-size: 16px; width: 18px; text-align: center; }
  .menu-group {
    padding: 14px 12px 6px;
    font-size: 11px;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 700;
  }

  /* ====== Editor area ====== */
  .editor {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--bg);
  }

  /* Tab bar */
  .tabs {
    background: var(--surface);
    height: 40px;
    display: flex;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    padding: 0 8px;
  }
  .tab {
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
    border-radius: 6px;
    margin: 4px 2px;
    transition: background 0.15s, color 0.15s;
  }
  .tab:hover { color: var(--text); background: var(--surface-2); }
  .tab.active {
    background: var(--primary-soft);
    color: var(--primary-dark);
    font-weight: 600;
  }
  .tab .close-btn {
    width: 18px; height: 18px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    color: transparent;
  }
  .tab.active .close-btn, .tab:hover .close-btn { color: var(--text-muted); }
  .tab .close-btn:hover { background: var(--border); color: var(--text); }

  /* Panel content */
  .panels { flex: 1; overflow: auto; }
  .panel { display: none; padding: 20px; }
  .panel.active { display: block; }

  /* ====== Status bar ====== */
  .statusbar {
    height: 26px;
    background: var(--primary);
    color: white;
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 12px;
    gap: 16px;
    flex-shrink: 0;
    font-weight: 500;
  }
  .statusbar .right { margin-left: auto; }

  /* ====== Common card / chart styles ====== */
  .grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s;
  }
  .card:hover { box-shadow: var(--shadow-md); }
  .card h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: -0.01em;
  }
  .card h3::before {
    content: '';
    width: 3px;
    height: 14px;
    background: var(--primary);
    border-radius: 2px;
  }
  .col-3 { grid-column: span 3; }
  .col-4 { grid-column: span 4; }
  .col-5 { grid-column: span 5; }
  .col-6 { grid-column: span 6; }
  .col-7 { grid-column: span 7; }
  .col-8 { grid-column: span 8; }
  .col-9 { grid-column: span 9; }
  .col-12 { grid-column: span 12; }

  .gauge-wrap { display: flex; flex-direction: column; align-items: center; }
  .gauge-value { font-size: 38px; font-weight: 800; color: var(--primary); margin-top: -55px; z-index: 2; position: relative; letter-spacing: -0.02em; }
  .gauge-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .gauge-sub { display: flex; justify-content: space-around; width: 100%; margin-top: 16px; padding-top: 14px; border-top: 1px dashed var(--border); }
  .gauge-sub-item { text-align: center; }
  .gauge-sub-item .v { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
  .gauge-sub-item .l { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-weight: 500; }

  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 12px; }
  .kpi { background: var(--primary-soft); padding: 12px; border-radius: 6px; text-align: center; border: 1px solid var(--primary-soft); }
  .kpi .v { font-size: 22px; font-weight: 800; color: var(--primary-dark); letter-spacing: -0.02em; }
  .kpi .l { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-weight: 500; }
  .kpi.green { background: var(--success-soft); border-color: var(--success-soft); }
  .kpi.green .v { color: var(--success); }
  .kpi.red { background: var(--danger-soft); border-color: var(--danger-soft); }
  .kpi.red .v { color: var(--danger); }
  .kpi.orange { background: var(--warning-soft); border-color: var(--warning-soft); }
  .kpi.orange .v { color: var(--warning); }

  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  table th { background: var(--surface-2); color: var(--text-muted); padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.04em; }
  table td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
  table tr:hover td { background: var(--surface-3); }
  table tr:last-child td { border-bottom: none; }

  .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .badge-done { background: var(--success-soft); color: var(--success); }
  .badge-start { background: var(--primary-soft); color: var(--primary-dark); }
  .badge-plan { background: var(--warning-soft); color: var(--warning); }

  .chart-container { position: relative; height: 240px; }
  .chart-tall { height: 280px; }
  .chart-short { height: 200px; }

  .scroll-table { max-height: 320px; overflow-y: auto; }
  .scroll-table::-webkit-scrollbar { width: 8px; }
  .scroll-table::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  .scroll-table::-webkit-scrollbar-thumb:hover { background: var(--text-soft); }
  .panels::-webkit-scrollbar, .sidebar-content::-webkit-scrollbar { width: 10px; }
  .panels::-webkit-scrollbar-thumb, .sidebar-content::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 5px; }
  .panels::-webkit-scrollbar-thumb:hover { background: var(--text-soft); }

  .info-list { list-style: none; font-size: 13px; color: var(--text); }
  .info-list li { padding: 7px 0; border-bottom: 1px dashed var(--border); padding-left: 20px; position: relative; }
  .info-list li::before { content: '▸'; position: absolute; left: 0; color: var(--primary); font-weight: 700; }
  .info-list li:last-child { border-bottom: none; }

  /* ====== Photo gallery ====== */
  .photo-toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
    align-items: center;
    background: var(--surface);
    padding: 12px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-xs);
  }
  .photo-toolbar button {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    font-weight: 500;
    transition: all 0.15s;
  }
  .photo-toolbar button:hover { background: var(--surface-3); border-color: var(--border-strong); }
  .photo-toolbar button.active { background: var(--primary); border-color: var(--primary); color: white; }

  .photo-section { margin-bottom: 28px; }
  .photo-section h2 {
    font-size: 15px;
    color: var(--text);
    margin-bottom: 14px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--primary);
    border-radius: 0 6px 6px 0;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .photo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    cursor: pointer;
    box-shadow: var(--shadow-xs);
  }
  .photo-card:hover { transform: translateY(-2px); border-color: var(--primary); box-shadow: var(--shadow-md); }
  .photo-card .thumb {
    width: 100%;
    height: 180px;
    background: var(--surface-2);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .photo-card .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .photo-card .caption {
    padding: 12px 14px;
    font-size: 12.5px;
    color: var(--text);
    line-height: 1.5;
    min-height: 50px;
    position: relative;
    border-top: 1px solid var(--border);
  }
  .photo-card .caption-text { display: block; padding-right: 28px; word-break: break-word; }
  .photo-card .caption-edit-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 24px;
    height: 24px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    padding: 0;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s;
  }
  .photo-card:hover .caption-edit-btn { opacity: 1; }
  .photo-card .caption-edit-btn:hover { background: var(--primary); border-color: var(--primary); color: #fff; }
  .photo-card .caption-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--primary);
    color: var(--text);
    padding: 7px 10px;
    font-size: 12.5px;
    font-family: inherit;
    border-radius: 6px;
    resize: vertical;
    min-height: 50px;
    outline: none;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
  }
  .photo-card .caption-actions { margin-top: 8px; display: flex; gap: 6px; }
  .photo-card .caption-actions button {
    background: var(--primary);
    border: none;
    color: white;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
    font-weight: 500;
  }
  .photo-card .caption-actions button:hover { background: var(--primary-hover); }
  .photo-card .caption-actions button.cancel { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
  .photo-card .caption-actions button.cancel:hover { background: var(--surface-3); }
  .photo-card .delete-btn {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(239, 68, 68, 0.92);
    color: #fff;
    border: none;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s;
    z-index: 2;
    box-shadow: var(--shadow-sm);
  }
  .photo-card:hover .delete-btn { opacity: 1; }
  .photo-card .delete-btn:hover { background: #dc2626; }

  /* ====== Upload Panel ====== */
  .upload-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-sm);
  }
  .upload-form h3 {
    font-size: 15px;
    color: var(--text);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .upload-row { display: flex; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
  .upload-field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 160px; }
  .upload-field label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
  .upload-field select, .upload-field input[type="text"] {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .upload-field select:focus, .upload-field input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
  }
  .drop-zone {
    border: 2px dashed var(--border-strong);
    border-radius: var(--radius);
    padding: 36px 16px;
    text-align: center;
    color: var(--text-muted);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    margin-bottom: 14px;
    background: var(--surface-3);
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--primary);
    background: var(--primary-soft);
    color: var(--primary-dark);
  }
  .drop-zone .dz-icon { font-size: 40px; margin-bottom: 8px; }
  .drop-zone .dz-hint { font-size: 11px; color: var(--text-soft); margin-top: 6px; }
  .upload-queue { display: flex; flex-direction: column; gap: 8px; max-height: 320px; overflow-y: auto; }
  .upload-queue-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px;
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .upload-queue-item img { width: 56px; height: 56px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
  .upload-queue-item .meta { flex: 1; min-width: 0; }
  .upload-queue-item .fname { font-size: 12px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  .upload-queue-item input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-family: inherit;
    margin-top: 6px;
  }
  .upload-queue-item input[type="text"]:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
  .upload-queue-item .remove-q {
    background: var(--danger-soft);
    color: var(--danger);
    border: 1px solid var(--danger-border);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
  }
  .upload-queue-item .remove-q:hover { background: var(--danger); color: #fff; }
  .upload-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .upload-actions button {
    background: var(--success-soft);
    border: 1px solid var(--success-border);
    color: var(--success);
    padding: 9px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12.5px;
    font-family: inherit;
    font-weight: 600;
    transition: all 0.15s;
  }
  .upload-actions button:hover { background: var(--success); color: #fff; }
  .upload-actions button.secondary { background: var(--surface-2); border-color: var(--border); color: var(--text); }
  .upload-actions button.secondary:hover { background: var(--surface-3); border-color: var(--border-strong); color: var(--text); }
  .upload-actions button.danger { background: var(--danger-soft); border-color: var(--danger-border); color: var(--danger); }
  .upload-actions button.danger:hover { background: var(--danger); color: #fff; }
  .upload-actions button:disabled { opacity: 0.5; cursor: not-allowed; }
  .upload-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 18px;
  }
  .upload-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 14px 16px;
    border-radius: var(--radius);
    box-shadow: var(--shadow-xs);
  }
  .upload-stat .v { font-size: 22px; font-weight: 800; color: var(--primary-dark); letter-spacing: -0.02em; }
  .upload-stat .l { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-weight: 500; }

  /* Lightbox (keeps dark for image viewing) */
  .lightbox {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(15, 23, 42, 0.95);
    z-index: 9999;
    align-items: center;

  .tab-toolbar button.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
  .tab-toolbar button.primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }

<script>
//============================================================
// Tab management
//============================================================
const TAB_DEFS = {
  overview:   { title: '종합 대시보드',     icon: '📊' },
  progress:   { title: '공정 관리',         icon: '📈' },
  resource:   { title: '시공/자원관리',     icon: '👷' },
  safety:     { title: '안전 관리',         icon: '🛡️' },
  photos:     { title: '월별 작업사진',     icon: '📷' },
  upload:     { title: '사진 업로드/관리',  icon: '📤' },
  milestones: { title: '마일스톤',          icon: '🎯' },
  editor:     { title: '데이터 편집',       icon: '✏️' },
  info:       { title: '프로젝트 정보',     icon: 'ℹ️' }
};
const openTabs = new Set();
let activeTab = null;

function openTab(key) {
  if (!openTabs.has(key)) {
    openTabs.add(key);
    renderTabs();
    renderPanel(key);
  }
  setActive(key);
}

function setActive(key) {
  activeTab = key;
  document.querySelectorAll('.menu-item').forEach(el => el.classList.toggle('active', el.dataset.tab === key));
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.tab === key));
  document.querySelectorAll('.panel').forEach(el => el.classList.toggle('active', el.dataset.tab === key));
  setStatus(`${TAB_DEFS[key].icon} ${TAB_DEFS[key].title}`);
}

function closeTab(key, ev) {
  ev && ev.stopPropagation();
  openTabs.delete(key);
  const panel = document.querySelector(`.panel[data-tab="${key}"]`);
  if (panel) panel.remove();
  renderTabs();
  if (activeTab === key) {
    const next = openTabs.values().next().value || 'overview';
    if (!openTabs.has(next)) openTab(next);
    else setActive(next);
  }
}

function renderTabs() {
  const tb = document.getElementById('tabs');
  tb.innerHTML = '';
  for (const k of openTabs) {
    const t = TAB_DEFS[k];
    const el = document.createElement('div');
    el.className = 'tab' + (activeTab === k ? ' active' : '');
    el.dataset.tab = k;
    el.innerHTML = `<span>${t.icon}</span><span>${t.title}</span><span class="close-btn">×</span>`;
    el.onclick = () => setActive(k);
    el.querySelector('.close-btn').onclick = (e) => closeTab(k, e);
    tb.appendChild(el);
  }
}

function renderPanel(key) {
  const wrap = document.getElementById('panels');
  if (wrap.querySelector(`.panel[data-tab="${key}"]`)) return;
  const panel = document.createElement('div');
  panel.className = 'panel';
  panel.dataset.tab = key;
  panel.innerHTML = PANELS[key]();
  wrap.appendChild(panel);
  // Run after DOM insertion
  setTimeout(() => PANEL_INIT[key] && PANEL_INIT[key](), 30);
}

function setStatus(msg) { document.getElementById('status-msg').textContent = msg; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

document.querySelectorAll('.menu-item').forEach(el => {
  el.onclick = () => openTab(el.dataset.tab);
});

//============================================================
// Chart.js defaults
//============================================================
Chart.defaults.color = '#475569';
Chart.defaults.borderColor = '#e2e8f0';
Chart.defaults.font.family = "'Pretendard','Inter','Malgun Gothic','Segoe UI',sans-serif";

//============================================================
// Chart instances cache
//============================================================
const charts = {};
function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }

//============================================================
// PANELS — HTML markup builders
//============================================================
const D = () => window.DASHBOARD_DATA;
const PANELS = {};
const PANEL_INIT = {};

//============================================================
// DASHBOARD_DATA persistence (localStorage)
//============================================================
const DASHBOARD_STORAGE_KEY = 'gwangyang_lng_dashboard_v1';

// data.js로부터 막 로드된 원본을 별도로 백업 (resetData에서 사용)
const _ORIGINAL_DATA = JSON.parse(JSON.stringify(window.DASHBOARD_DATA));

function persistDashboardData() {
  try {
    localStorage.setItem(DASHBOARD_STORAGE_KEY, JSON.stringify(window.DASHBOARD_DATA));
  } catch (err) {
    console.warn('대시보드 데이터 저장 실패:', err);
    showToast('⚠️ 데이터 저장 실패 (localStorage 용량 초과 가능)');
  }
}

function loadDashboardFromStorage() {
  try {
    const raw = localStorage.getItem(DASHBOARD_STORAGE_KEY);
    if (!raw) return false;
    const stored = JSON.parse(raw);
    if (stored && typeof stored === 'object') {
      window.DASHBOARD_DATA = stored;
      return true;
    }
  } catch (err) {
    console.warn('대시보드 데이터 복원 실패:', err);
  }
  return false;
}

loadDashboardFromStorage();

//============================================================
// Inline edit toolbar (per-tab edit mode)
//============================================================
const tabEditState = {}; // { progress: false, resource: false, safety: false }

function tabToolbar(tabKey) {
  return `
    <div class="tab-toolbar" data-tab-toolbar="${tabKey}">
      <span class="label">데이터 편집:</span>
      <button class="edit-toggle" data-tab="${tabKey}">✏️ 편집모드 OFF</button>
      <button class="primary save-btn" data-tab="${tabKey}" style="display:none;">💾 저장 & 차트 갱신</button>
      <button class="secondary" onclick="exportData()">⬇️ JSON 내보내기</button>
      <button class="secondary" onclick="document.getElementById('json-import-${tabKey}').click()">⬆️ JSON 불러오기</button>
      <input type="file" id="json-import-${tabKey}" accept=".json" style="display:none;" onchange="importData(event)">
      <span class="info">변경사항은 자동으로 브라우저에 저장됩니다 (localStorage)</span>
    </div>
  `;
}

function bindTabToolbar(tabKey) {
  const root = document.querySelector(`.panel[data-tab="${tabKey}"]`);
  if (!root) return;
  const editBtn = root.querySelector(`.edit-toggle[data-tab="${tabKey}"]`);
  const saveBtn = root.querySelector(`.save-btn[data-tab="${tabKey}"]`);
  const editArea = root.querySelector(`.inline-edit-area[data-edit="${tabKey}"]`);
  if (!editBtn || !editArea) return;

  const sync = () => {
    const on = !!tabEditState[tabKey];
    editBtn.classList.toggle('on', on);
    editBtn.textContent = on ? '✏️ 편집모드 ON' : '✏️ 편집모드 OFF';
    editArea.classList.toggle('active', on);
    if (saveBtn) saveBtn.style.display = on ? '' : 'none';
    if (on) renderInlineEditTables(tabKey);
  };
  editBtn.onclick = () => {
    tabEditState[tabKey] = !tabEditState[tabKey];
    sync();
  };
  if (saveBtn) saveBtn.onclick = () => saveTabEdits(tabKey);
  // Bind collapsible section headers inside the inline area
  editArea.querySelectorAll('.editor-section .section-header').forEach(h => {
    h.onclick = () => h.parentElement.classList.toggle('collapsed');
  });
  sync();
}

function renderInlineEditTables(tabKey) {
  const d = D();
  if (tabKey === 'progress') {
    const tgt = document.getElementById('ed-progress-inline');
    if (!tgt) return;
    let h = '<thead><tr><th>구분</th>' + d.progress.months.map(m => `<th colspan="2">${m}</th>`).join('') +
            '</tr><tr><th></th>' + d.progress.months.map(() => '<th>계획</th><th>실적</th>').join('') + '</tr></thead><tbody>';
    ['종합','육상부','해상부','154kV'].forEach(s => {
      h += `<tr><td><b>${s}</b></td>`;
      d.progress.months.forEach((m,i) => {
        h += `<td class="num"><input type="number" step="0.01" value="${d.progress[s].plan[i]}" data-path="progress.${s}.plan.${i}"></td>`;
        h += `<td class="num"><input type="number" step="0.01" value="${d.progress[s].actual[i]}" data-path="progress.${s}.actual.${i}"></td>`;
      });
      h += '</tr>';
    });
    h += '</tbody>';
    tgt.innerHTML = h;
  } else if (tabKey === 'resource') {
    const tgt = document.getElementById('ed-manpower-inline');
    if (!tgt) return;
    let h = '<thead><tr><th>구분</th>' + d.manpower.months.map(m => `<th colspan="2">${m}</th>`).join('') +
            '</tr><tr><th></th>' + d.manpower.months.map(() => '<th>관리자</th><th>협력사</th>').join('') + '</tr></thead><tbody>';
    ['종합','육상부','해상부','154kV'].forEach(s => {
      h += `<tr><td><b>${s}</b></td>`;
      d.manpower.months.forEach((m,i) => {
        h += `<td class="num"><input type="number" value="${d.manpower[s].manager[i]}" data-path="manpower.${s}.manager.${i}"></td>`;
        h += `<td class="num"><input type="number" value="${d.manpower[s].partner[i]}" data-path="manpower.${s}.partner.${i}"></td>`;
      });
      h += '</tr>';
    });
    h += '</tbody>';
    tgt.innerHTML = h;
  } else if (tabKey === 'safety') {
    // 무재해
    const tgtA = document.getElementById('ed-noacc-inline');
    if (tgtA) {
      let h = '<thead><tr><th>구분</th>' + d.no_accident_days.months.map(m => `<th>${m}</th>`).join('') + '</tr></thead><tbody>';
      ['육상부','해상부','154kV'].forEach(s => {
        h += `<tr><td><b>${s}</b></td>`;
        d.no_accident_days.months.forEach((m,i) => {
          const v = d.no_accident_days[s][i];
          h += `<td class="num"><input type="number" value="${v ?? ''}" placeholder="(없음)" data-path="no_accident_days.${s}.${i}"></td>`;
        });
        h += '</tr>';
      });
      h += '</tbody>';
      tgtA.innerHTML = h;
    }
    // 안전점검 분류
    const tgtB = document.getElementById('ed-audit-inline');
    if (tgtB) {
      const cats = ['추락','전도','낙하/비래','감전','충돌/협착','붕괴/도괴','화재/폭발','질식','기타'];
      let h = '<thead><tr><th>분류</th>' + d.safety_audit_land.months.map(m => `<th>${m}</th>`).join('') + '</tr></thead><tbody>';
      cats.forEach(c => {
        h += `<tr><td><b>${c}</b></td>`;
        d.safety_audit_land.months.forEach((m,i) => {
          h += `<td class="num"><input type="number" value="${d.safety_audit_land[c][i]}" data-path="safety_audit_land.${c}.${i}"></td>`;
        });
        h += '</tr>';
      });
      h += '</tbody>';
      tgtB.innerHTML = h;
    }
    // 안전교육
    const tgtC = document.getElementById('ed-edu-inline');
    if (tgtC) {
      const eduCats = ['채용/작업변경','특별교육','관리감독자','정기교육'];
      let h = '<thead><tr><th>교육</th>' + d.safety_edu_land.months.map(m => `<th>${m}</th>`).join('') + '</tr></thead><tbody>';
      eduCats.forEach(c => {
        h += `<tr><td><b>${c}</b></td>`;
        d.safety_edu_land.months.forEach((m,i) => {
          h += `<td class="num"><input type="number" value="${d.safety_edu_land[c][i]}" data-path="safety_edu_land.${c}.${i}"></td>`;
        });
        h += '</tr>';
      });
      h += '</tbody>';
      tgtC.innerHTML = h;
    }
    // 재해 / Near Miss
    const tgtD = document.getElementById('ed-incident-inline');
    if (tgtD) {
      let h = '<thead><tr><th>공구</th><th>공상</th><th>일반재해</th><th>중대재해</th><th>일반NM</th><th>중대NM</th></tr></thead><tbody>';

function saveTabEdits(tabKey) {
  const root = document.querySelector(`.panel[data-tab="${tabKey}"]`);
  if (!root) return;
  const area = root.querySelector(`.inline-edit-area[data-edit="${tabKey}"]`);
  if (!area) return;
  area.querySelectorAll('input[data-path], select[data-path]').forEach(el => {
    let v = el.value;
    if (el.type === 'number') v = (v === '' ? null : parseFloat(v));
    setByPath(D(), el.dataset.path, v);
  });
  persistDashboardData();
  // Re-render all open tabs (이 탭은 물론 종합 대시보드도 즉시 반영)
  for (const k of openTabs) {
    const panel = document.querySelector(`.panel[data-tab="${k}"]`);
    if (!panel) continue;
    const wasEditOn = !!tabEditState[k];
    panel.innerHTML = PANELS[k]();
    setTimeout(() => {
      if (PANEL_INIT[k]) PANEL_INIT[k]();
      if (wasEditOn) tabEditState[k] = true;
    }, 30);
  }
  showToast('✅ 변경사항이 저장되어 모든 차트에 반영되었습니다');
}

let photoEditMode = false;

PANEL_INIT.photos = () => {
  const root = document.querySelector('.panel[data-tab="photos"]');

      editBtn.style.borderColor = photoEditMode ? 'var(--primary)' : 'var(--success-border)';
      editBtn.style.color = photoEditMode ? '#fff' : 'var(--success)';

function renderPhotoGallery() {
  const wrap = document.getElementById('photo-content');
  if (!wrap) return;
  const data = window.PHOTOS_DATA;
  let html = '';
  let allItems = [];
  let count = 0;
  Object.keys(data).forEach(month => {
    if (currentPhotoFilter.month !== 'all' && currentPhotoFilter.month !== month) return;
    data[month].forEach((section, secIdx) => {
      if (currentPhotoFilter.category !== 'all' && currentPhotoFilter.category !== section.category) return;
      if (currentPhotoFilter.type && currentPhotoFilter.type !== 'all' && currentPhotoFilter.type !== section.type) return;
      html += `<div class="photo-section">
        <h2>${section.title} <span style="color:var(--text-muted); font-weight:500; font-size:12px;">(${section.items.length}장)</span></h2>
        <div class="photo-grid">`;
      section.items.forEach((item, itemIdx) => {
        const idx = allItems.length;
        allItems.push({ file: item.file, caption: item.caption, section: section.title, month, secIdx, itemIdx });
        const safeCap = (item.caption || '').replace(/"/g, '&quot;').replace(/</g, '&lt;');
        const cardClick = photoEditMode ? '' : `onclick="openLightbox(${idx})"`;
        const delBtn = photoEditMode ? `<button class="delete-btn" title="사진 삭제" onclick="event.stopPropagation(); deletePhoto('${month}', ${secIdx}, ${itemIdx})">🗑</button>` : '';
        const imgSrc = item.file.startsWith('data:') ? item.file : encodeURI(item.file);
        html += `
          <div class="photo-card" ${cardClick}>
            <div class="thumb">${delBtn}<img loading="lazy" src="${imgSrc}" alt="" onerror="this.style.opacity=0.3; this.alt='이미지 없음';"></div>
            <div class="caption" data-month="${month}" data-sec="${secIdx}" data-item="${itemIdx}">
              <span class="caption-text">${safeCap}</span>
              <button class="caption-edit-btn" title="캡션 수정" onclick="event.stopPropagation(); editCaption(this)">✏️</button>
            </div>
          </div>`;
        count++;
      });
      html += `</div></div>`;
    });
  });
  wrap.innerHTML = html || '<div style="padding:40px; text-align:center; color:var(--text-muted);">조건에 맞는 사진이 없습니다.</div>';
  currentPhotoSet = allItems;
  const cnt = document.getElementById('photo-count');
  if (cnt) cnt.textContent = `총 ${count}장`;
}

function editCaption(btn) {
  const cap = btn.parentElement;
  const month = cap.dataset.month;
  const secIdx = +cap.dataset.sec;
  const itemIdx = +cap.dataset.item;
  const item = window.PHOTOS_DATA[month][secIdx].items[itemIdx];
  cap.innerHTML = `
    <textarea class="caption-input" rows="3">${(item.caption || '').replace(/</g, '&lt;')}</textarea>
    <div class="caption-actions">
      <button onclick="event.stopPropagation(); saveCaption(this, '${month}', ${secIdx}, ${itemIdx})">💾 저장</button>
      <button class="cancel" onclick="event.stopPropagation(); renderPhotoGallery()">취소</button>
    </div>
  `;
  const ta = cap.querySelector('textarea');
  ta.focus();
  ta.onclick = e => e.stopPropagation();
}

function saveCaption(btn, month, secIdx, itemIdx) {
  const ta = btn.parentElement.parentElement.querySelector('textarea');
  const newCap = ta.value.trim();
  window.PHOTOS_DATA[month][secIdx].items[itemIdx].caption = newCap;
  persistPhotosData();
  renderPhotoGallery();
  showToast('✅ 캡션이 수정되었습니다');
}

function deletePhoto(month, secIdx, itemIdx) {
  const item = window.PHOTOS_DATA[month][secIdx].items[itemIdx];
  if (!confirm(`이 사진을 삭제하시겠습니까?\n\n캡션: ${item.caption}`)) return;
  window.PHOTOS_DATA[month][secIdx].items.splice(itemIdx, 1);
  persistPhotosData();
  renderPhotoGallery();
  if (typeof renderUploadStats === 'function') renderUploadStats();
  showToast('🗑 사진이 삭제되었습니다');
}

function openLightbox(i) {
  currentPhotoIdx = i;
  const it = currentPhotoSet[i];
  const src = it.file.startsWith('data:') ? it.file : encodeURI(it.file);
  document.getElementById('lb-img').src = src;
  document.getElementById('lb-caption').textContent = `${it.section}  |  ${it.caption}`;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('show'); }
function navLightbox(dir) {
  currentPhotoIdx = (currentPhotoIdx + dir + currentPhotoSet.length) % currentPhotoSet.length;
  openLightbox(currentPhotoIdx);
}
document.getElementById('lightbox').addEventListener('click', e => { if (e.target.id === 'lightbox') closeLightbox(); });
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('show')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

const PHOTOS_STORAGE_KEY = 'gwangyang_lng_photos_v1';

function persistPhotosData() {
  try {
    const json = JSON.stringify(window.PHOTOS_DATA);
    localStorage.setItem(PHOTOS_STORAGE_KEY, json);
  } catch (err) {
    console.warn('localStorage 저장 실패 (용량 초과 가능):', err);
    showToast('⚠️ localStorage 저장 실패 — 용량이 초과되었을 수 있습니다');
  }
}

function loadPhotosFromStorage() {
  try {
    const raw = localStorage.getItem(PHOTOS_STORAGE_KEY);
    if (!raw) return false;
    const stored = JSON.parse(raw);
    if (stored && typeof stored === 'object') {
      window.PHOTOS_DATA = stored;
      return true;
    }
  } catch (err) {
    console.warn('localStorage 복원 실패:', err);
  }
  return false;
}

const _ORIGINAL_PHOTOS_DATA = JSON.parse(JSON.stringify(window.PHOTOS_DATA));

PANEL_INIT.upload = () => {
  const root = document.querySelector('.panel[data-tab="upload"]');
  const monthSel = root.querySelector('#up-month');
  const newWrap = root.querySelector('#up-newmonth-wrap');
  const titleInput = root.querySelector('#up-title');
  const categorySel = root.querySelector('#up-category');
  const typeSel = root.querySelector('#up-type');

  const updateAutoTitle = () => {
    const m = monthSel.value === '__new__' ? (root.querySelector('#up-newmonth').value || '신규') : monthSel.value;
    const c = categorySel.value;
    const typeLabel = typeSel.value === '안전점검' ? '안전점검 사진' : (typeSel.value === '공사사진' ? '공사 사진' : '공정사진');
    const subLabel = c === '154kV' ? '154kV 수전공사' : (c === '해상부' ? '항만공사' : c);
    titleInput.value = `${typeLabel} (${subLabel}) - ${m}`;
  };
  monthSel.onchange = () => {
    newWrap.style.display = monthSel.value === '__new__' ? 'flex' : 'none';
    updateAutoTitle();
  };
  root.querySelector('#up-newmonth').oninput = updateAutoTitle;
  categorySel.onchange = updateAutoTitle;
  typeSel.onchange = updateAutoTitle;
  updateAutoTitle();

  const dz = root.querySelector('#drop-zone');
  const fi = root.querySelector('#file-input');
  dz.onclick = () => fi.click();
  dz.ondragover = e => { e.preventDefault(); dz.classList.add('dragover'); };
  dz.ondragleave = () => dz.classList.remove('dragover');
  dz.ondrop = e => {
    e.preventDefault();
    dz.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  };
  fi.onchange = () => handleFiles(fi.files);

  root.querySelector('#btn-upload-add').onclick = commitUploadQueue;
  root.querySelector('#btn-clear-queue').onclick = () => {
    if (uploadQueue.length === 0) return;
    if (!confirm('대기열을 비우시겠습니까?')) return;
    uploadQueue = [];
    renderUploadQueue();
  };

  renderUploadQueue();
  renderUploadStats();
};

function handleFiles(fileList) {
  const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
  if (files.length === 0) {
    showToast('⚠️ 이미지 파일만 업로드 가능합니다');
    return;
  }
  let pending = files.length;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      uploadQueue.push({
        name: file.name,
        dataUrl: e.target.result,
        caption: file.name.replace(/\.[^.]+$/, '')
      });
      pending--;
      if (pending === 0) renderUploadQueue();
    };
    reader.readAsDataURL(file);
  });
}

function renderUploadQueue() {
  const wrap = document.getElementById('upload-queue');
  if (!wrap) return;
  if (uploadQueue.length === 0) {
    wrap.innerHTML = '<div style="padding:14px; text-align:center; color:#666; font-size:12px;">선택된 사진이 없습니다</div>';
    return;
  }
  wrap.innerHTML = uploadQueue.map((q, i) => `
    <div class="upload-queue-item">
      <img src="${q.dataUrl}" alt="">
      <div class="meta">
        <div class="fname">${q.name}</div>
        <input type="text" placeholder="캡션 입력 (예: 작업 내용 ('26.04.01))" value="${(q.caption || '').replace(/"/g, '&quot;')}" onchange="uploadQueue[${i}].caption=this.value">
      </div>
      <button class="remove-q" onclick="uploadQueue.splice(${i},1); renderUploadQueue();">제거</button>
    </div>
  `).join('');
}

function commitUploadQueue() {
  if (uploadQueue.length === 0) {
    showToast('⚠️ 추가할 사진이 없습니다');
    return;
  }
  const root = document.querySelector('.panel[data-tab="upload"]');
  let month = root.querySelector('#up-month').value;
  if (month === '__new__') {
    month = (root.querySelector('#up-newmonth').value || '').trim();
    if (!month) { alert('새 월 이름을 입력하세요'); return; }
    if (!window.PHOTOS_DATA[month]) window.PHOTOS_DATA[month] = [];
  }
  const category = root.querySelector('#up-category').value;
  const type = root.querySelector('#up-type').value;
  const title = root.querySelector('#up-title').value || `${type} (${category}) - ${month}`;

  let section = window.PHOTOS_DATA[month].find(s => s.category === category && s.type === type);
  if (!section) {
    section = { title, category, type, items: [] };
    window.PHOTOS_DATA[month].push(section);
  } else {
    section.title = title;
  }

  uploadQueue.forEach(q => {
    section.items.push({ file: q.dataUrl, caption: q.caption || '' });
  });

  const added = uploadQueue.length;
  uploadQueue = [];
  renderUploadQueue();
  persistPhotosData();
  renderUploadStats();
  reloadPhotosTabIfOpen();
  showToast(`✅ ${added}장의 사진이 추가되었습니다`);
}

function renderUploadStats() {
  const wrap = document.getElementById('upload-stats');
  if (!wrap) return;
  let total = 0, sections = 0;
  const byMonth = {};
  Object.keys(window.PHOTOS_DATA).forEach(m => {
    let mc = 0;
    window.PHOTOS_DATA[m].forEach(s => {
      sections++;
      mc += s.items.length;
    });
    byMonth[m] = mc;
    total += mc;
  });
  wrap.innerHTML = `
    <div class="upload-stat"><div class="v">${total}</div><div class="l">전체 사진</div></div>
    <div class="upload-stat"><div class="v">${Object.keys(window.PHOTOS_DATA).length}</div><div class="l">월</div></div>
    <div class="upload-stat"><div class="v">${sections}</div><div class="l">섹션</div></div>
    ${Object.entries(byMonth).map(([m,c]) => `<div class="upload-stat"><div class="v">${c}</div><div class="l">${m}</div></div>`).join('')}
  `;
}

function reloadPhotosTabIfOpen() {
  if (!openTabs.has('photos')) return;
  const panel = document.querySelector('.panel[data-tab="photos"]');
  if (!panel) return;
  panel.innerHTML = PANELS.photos();
  setTimeout(() => PANEL_INIT.photos(), 30);
}

function exportPhotosData() {
  const blob = new Blob([JSON.stringify(window.PHOTOS_DATA, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `photos_data_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('💾 사진 데이터 JSON이 다운로드되었습니다');
}

function importPhotosData(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (typeof data !== 'object' || Array.isArray(data)) throw new Error('형식이 올바르지 않습니다');
      window.PHOTOS_DATA = data;
      persistPhotosData();
      renderUploadStats();
      reloadPhotosTabIfOpen();
      showToast('📥 사진 데이터를 불러왔습니다');
    } catch (err) {
      alert('JSON 파일 읽기 실패: ' + err.message);
    }
  };
  reader.readAsText(file);
  ev.target.value = '';
}

function resetPhotosData() {
  if (!confirm('원본 사진 데이터로 복원하시겠습니까?\n업로드된 사진과 수정된 캡션이 모두 사라집니다.')) return;
  window.PHOTOS_DATA = JSON.parse(JSON.stringify(_ORIGINAL_PHOTOS_DATA));
  localStorage.removeItem(PHOTOS_STORAGE_KEY);
  renderUploadStats();
  reloadPhotosTabIfOpen();
  showToast('↻ 원본 사진 데이터로 복원되었습니다');
}
