<script>
//============================================================
// Tab management
//============================================================
const TAB_DEFS = {
  overview:   { title: '종합 대시보드',     icon: '📊' },
  progress:   { title: '공정 관리',         icon: '📈' },
  resource:   { title: '시공/자원관리',     icon: '👷' },
  safety:     { title: '안전 관리',         icon: '🛡️' },
  photos:     { title: '월별 작업사진',     icon: '📷' },
  upload:     { title: '사진 업로드/관리',  icon: '📤' },
  milestones: { title: '마일스톤',          icon: '🎯' },
  editor:     { title: '데이터 편집',       icon: '✏️' },
  info:       { title: '프로젝트 정보',     icon: 'ℹ️' }
};
const openTabs = new Set();
let activeTab = null;

function openTab(key) {
  if (!openTabs.has(key)) {
    openTabs.add(key);
    renderTabs();
    renderPanel(key);
  }
  setActive(key);
}

function setActive(key) {
  activeTab = key;
  document.querySelectorAll('.menu-item').forEach(el => el.classList.toggle('active', el.dataset.tab === key));
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.tab === key));
  document.querySelectorAll('.panel').forEach(el => el.classList.toggle('active', el.dataset.tab === key));
  setStatus(`${TAB_DEFS[key].icon} ${TAB_DEFS[key].title}`);
}

function closeTab(key, ev) {
  ev && ev.stopPropagation();
  openTabs.delete(key);
  const panel = document.querySelector(`.panel[data-tab="${key}"]`);
  if (panel) panel.remove();
  renderTabs();
  if (activeTab === key) {
    const next = openTabs.values().next().value || 'overview';
    if (!openTabs.has(next)) openTab(next);
    else setActive(next);
  }
}

function renderTabs() {
  const tb = document.getElementById('tabs');
  tb.innerHTML = '';
  for (const k of openTabs) {
    const t = TAB_DEFS[k];
    const el = document.createElement('div');
    el.className = 'tab' + (activeTab === k ? ' active' : '');
    el.dataset.tab = k;
    el.innerHTML = `<span>${t.icon}</span><span>${t.title}</span><span class="close-btn">×</span>`;
    el.onclick = () => setActive(k);
    el.querySelector('.close-btn').onclick = (e) => closeTab(k, e);
    tb.appendChild(el);
  }
}

function renderPanel(key) {
  const wrap = document.getElementById('panels');
  if (wrap.querySelector(`.panel[data-tab="${key}"]`)) return;
  const panel = document.createElement('div');
  panel.className = 'panel';
  panel.dataset.tab = key;
  panel.innerHTML = PANELS[key]();
  wrap.appendChild(panel);
  // Run after DOM insertion
  setTimeout(() => PANEL_INIT[key] && PANEL_INIT[key](), 30);
}

function setStatus(msg) { document.getElementById('status-msg').textContent = msg; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

document.querySelectorAll('.menu-item').forEach(el => {
  el.onclick = () => openTab(el.dataset.tab);
});

//============================================================
// Chart.js defaults
//============================================================
Chart.defaults.color = '#5a6677';
Chart.defaults.borderColor = '#e6eaf1';
Chart.defaults.font.family = "'Pretendard','Inter','Malgun Gothic','Segoe UI',sans-serif";
Chart.defaults.font.size = 13.5;

//============================================================
// Chart instances cache
//============================================================
const charts = {};
function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }

//============================================================
// PANELS — HTML markup builders
//============================================================
const D = () => window.DASHBOARD_DATA;
// 최근 N개월만 슬라이스한 데이터 객체를 반환 (시계열 차트/표용)
// 마일스톤·project 정보 등 시계열이 아닌 필드는 그대로 보존
function sliceLastN(d, n) {
  if (!d || !d.progress || !Array.isArray(d.progress.months)) return d;
  const N = d.progress.months.length;
  if (N <= n) return d;
  const start = N - n;
  const out = JSON.parse(JSON.stringify(d));
  for (const key of ['progress','manpower','no_accident_days','safety_audit_land','safety_edu_land']) {
    const obj = out[key];
    if (!obj) continue;
    if (Array.isArray(obj.months)) obj.months = obj.months.slice(start);
    for (const k of Object.keys(obj)) {
      if (k === 'months') continue;
      const v = obj[k];
      if (Array.isArray(v)) obj[k] = v.slice(start);
      else if (v && typeof v === 'object') {
        for (const k2 of Object.keys(v)) {
          if (Array.isArray(v[k2])) v[k2] = v[k2].slice(start);
        }
      }
    }
  }
  return out;
}
const D10 = () => sliceLastN(D(), 10);
const D6 = () => sliceLastN(D(), 6);
const PANELS = {};
const PANEL_INIT = {};

//============================================================
// Helpers
//============================================================
// Returns the last index in arr that has non-null/non-undefined value
function lastValidIdx(arr) {
  if (!Array.isArray(arr) || arr.length === 0) return 0;
  for (let i = arr.length - 1; i >= 0; i--) {
    if (arr[i] !== null && arr[i] !== undefined) return i;
  }
  return 0;
}
function getLastIdx() {
  const d = D();
  if (!d || !d.progress || !d.progress.종합) return 0;
  return lastValidIdx(d.progress.종합.actual);
}
function fmtMonthShort(m) {
  // "2025-06" -> "'25.6월"
  if (!m) return '';
  const [y, mm] = String(m).split('-');
  return `'${y.slice(2)}.${parseInt(mm,10)}월`;
}
function fmtMonthCompact(m) {
  // "2025-06" -> "25.06"
  if (!m) return '';
  const [y, mm] = String(m).split('-');
  return `${y.slice(2)}.${mm}`;
}
function sumNum(arr) {
  return (arr || []).reduce((s, v) => s + (Number.isFinite(v) ? v : 0), 0);
}
function avgNum(arr) {
  const v = (arr || []).filter(x => Number.isFinite(x));
  return v.length ? v.reduce((s,x) => s+x, 0) / v.length : 0;
}
function safeDiv(a, b) { return b ? a / b : 0; }
// Color palette for time-series datasets. Cycles for >12 months.
const MONTH_COLORS = [
  '#2c569f', '#4a7bd1', '#7a9fde', '#6ba8c0', '#92bccd',
  '#a3b3c4', '#bda790', '#d49462', '#b67d4f', '#c97070',
  '#a14d4d', '#9a8bb0'
];
const SUB_COLORS = { '종합': '#6b7787', '육상부': '#4a7bd1', '해상부': '#6ba8c0', '154kV': '#d49462' };
function monthColor(i) { return MONTH_COLORS[i % MONTH_COLORS.length]; }

//============================================================
// DASHBOARD_DATA persistence (localStorage)
//============================================================
const DASHBOARD_STORAGE_KEY = 'gwangyang_lng_dashboard_v3'; // v3: 2023-02~2026-03 (38개월)

// data.js로부터 막 로드된 원본을 별도로 백업 (resetData에서 사용)
const _ORIGINAL_DATA = JSON.parse(JSON.stringify(window.DASHBOARD_DATA));

function persistDashboardData() {
  try {
    localStorage.setItem(DASHBOARD_STORAGE_KEY, JSON.stringify(window.DASHBOARD_DATA));
  } catch (err) {
    console.warn('대시보드 데이터 저장 실패:', err);
    showToast('⚠️ 데이터 저장 실패 (localStorage 용량 초과 가능)');
  }
}

function loadDashboardFromStorage() {
  try {
    const raw = localStorage.getItem(DASHBOARD_STORAGE_KEY);
    if (!raw) return false;
    const stored = JSON.parse(raw);
    if (stored && typeof stored === 'object') {
      window.DASHBOARD_DATA = stored;
      return true;
    }
  } catch (err) {
    console.warn('대시보드 데이터 복원 실패:', err);
  }
  return false;
}

loadDashboardFromStorage();

//============================================================
// Edit auth gate — 비밀번호 4105 (세션 단위)
//============================================================
const EDIT_PASSWORD = '4105';
let __editAuthorized = false;
function requireEditAuth() {
  if (__editAuthorized) return true;
  const pwd = prompt('🔒 데이터 편집 비밀번호를 입력하세요:');
  if (pwd === null) return false;
  if (pwd === EDIT_PASSWORD) {
    __editAuthorized = true;
    showToast('🔓 편집 권한이 활성화되었습니다 (이 세션 동안 유지)');
    return true;
  }
  showToast('❌ 비밀번호가 올바르지 않습니다');
  return false;
}

//============================================================
// Inline edit toolbar (per-tab edit mode)
//============================================================
const tabEditState = {}; // { progress: false, resource: false, safety: false }

function tabToolbar(tabKey) {
  return `
    <div class="tab-toolbar" data-tab-toolbar="${tabKey}">
      <span class="label">데이터 편집:</span>
      <button class="edit-toggle" data-tab="${tabKey}">🔒 편집모드 OFF</button>
      <button class="primary save-btn" data-tab="${tabKey}" style="display:none;">💾 저장 & 차트 갱신</button>
      <span class="info">변경사항은 자동으로 브라우저에 저장됩니다 (localStorage)</span>
    </div>
  `;
}

function bindTabToolbar(tabKey) {
  const root = document.querySelector(`.panel[data-tab="${tabKey}"]`);
  if (!root) return;
  const editBtn = root.querySelector(`.edit-toggle[data-tab="${tabKey}"]`);
  const saveBtn = root.querySelector(`.save-btn[data-tab="${tabKey}"]`);
  const editArea = root.querySelector(`.inline-edit-area[data-edit="${tabKey}"]`);
  if (!editBtn || !editArea) return;

  const sync = () => {
    const on = !!tabEditState[tabKey];
    editBtn.classList.toggle('on', on);
    editBtn.textContent = on ? '✏️ 편집모드 ON' : '🔒 편집모드 OFF';
    editArea.classList.toggle('active', on);
    if (saveBtn) saveBtn.style.display = on ? '' : 'none';
    if (on) renderInlineEditTables(tabKey);
  };
  editBtn.onclick = () => {
    const turningOn = !tabEditState[tabKey];
    if (turningOn && !requireEditAuth()) return;
    tabEditState[tabKey] = turningOn;
    sync();
  };
  if (saveBtn) saveBtn.onclick = () => saveTabEdits(tabKey);
  // Bind collapsible section headers inside the inline area
  editArea.querySelectorAll('.editor-section .section-header').forEach(h => {
    h.onclick = () => h.parentElement.classList.toggle('collapsed');
  });
  sync();
}

function renderInlineEditTables(tabKey) {
  const d = D();
  if (tabKey === 'progress') {
    const tgt = document.getElementById('ed-progress-inline');
    if (!tgt) return;
    let h = '<thead><tr><th>구분</th>' + d.progress.months.map(m => `<th colspan="2">${m}</th>`).join('') +
            '</tr><tr><th></th>' + d.progress.months.map(() => '<th>계획</th><th>실적</th>').join('') + '</tr></thead><tbody>';
    ['종합','육상부','해상부','154kV'].forEach(s => {
      h += `<tr><td><b>${s}</b></td>`;
      d.progress.months.forEach((m,i) => {
        h += `<td class="num"><input type="number" step="0.01" value="${d.progress[s].plan[i]}" data-path="progress.${s}.plan.${i}"></td>`;
        h += `<td class="num"><input type="number" step="0.01" value="${d.progress[s].actual[i]}" data-path="progress.${s}.actual.${i}"></td>`;
      });
      h += '</tr>';
    });
    h += '</tbody>';
    tgt.innerHTML = h;
  } else if (tabKey === 'resource') {
    const tgt = document.getElementById('ed-manpower-inline');
    if (!tgt) return;
    let h = '<thead><tr><th>구분</th>' + d.manpower.months.map(m => `<th colspan="2">${m}</th>`).join('') +
            '</tr><tr><th></th>' + d.manpower.months.map(() => '<th>관리자</th><th>협력사</th>').join('') + '</tr></thead><tbody>';
    ['종합','육상부','해상부','154kV'].forEach(s => {
      h += `<tr><td><b>${s}</b></td>`;
      d.manpower.months.forEach((m,i) => {
        h += `<td class="num"><input type="number" value="${d.manpower[s].manager[i]}" data-path="manpower.${s}.manager.${i}"></td>`;
        h += `<td class="num"><input type="number" value="${d.manpower[s].partner[i]}" data-path="manpower.${s}.partner.${i}"></td>`;
      });
      h += '</tr>';
    });
    h += '</tbody>';
    tgt.innerHTML = h;
  } else if (tabKey === 'safety') {
    // 무재해
    const tgtA = document.getElementById('ed-noacc-inline');
    if (tgtA) {
      let h = '<thead><tr><th>구분</th>' + d.no_accident_days.months.map(m => `<th>${m}</th>`).join('') + '</tr></thead><tbody>';
      ['육상부','해상부','154kV'].forEach(s => {
        h += `<tr><td><b>${s}</b></td>`;
        d.no_accident_days.months.forEach((m,i) => {
          const v = d.no_accident_days[s][i];
          h += `<td class="num"><input type="number" value="${v ?? ''}" placeholder="(없음)" data-path="no_accident_days.${s}.${i}"></td>`;
        });
        h += '</tr>';
      });
      h += '</tbody>';
      tgtA.innerHTML = h;
    }
    // 안전점검 분류
    const tgtB = document.getElementById('ed-audit-inline');
    if (tgtB) {
      const cats = ['추락','전도','낙하/비래','감전','충돌/협착','붕괴/도괴','화재/폭발','질식','기타'];
      let h = '<thead><tr><th>분류</th>' + d.safety_audit_land.months.map(m => `<th>${m}</th>`).join('') + '</tr></thead><tbody>';
      cats.forEach(c => {
        h += `<tr><td><b>${c}</b></td>`;
        d.safety_audit_land.months.forEach((m,i) => {
          h += `<td class="num"><input type="number" value="${d.safety_audit_land[c][i]}" data-path="safety_audit_land.${c}.${i}"></td>`;
        });
        h += '</tr>';
      });
      h += '</tbody>';
      tgtB.innerHTML = h;
    }
    // 안전교육
    const tgtC = document.getElementById('ed-edu-inline');
    if (tgtC) {
      const eduCats = ['채용/작업변경','특별교육','관리감독자','정기교육'];
      let h = '<thead><tr><th>교육</th>' + d.safety_edu_land.months.map(m => `<th>${m}</th>`).join('') + '</tr></thead><tbody>';
      eduCats.forEach(c => {
        h += `<tr><td><b>${c}</b></td>`;
        d.safety_edu_land.months.forEach((m,i) => {
          h += `<td class="num"><input type="number" value="${d.safety_edu_land[c][i]}" data-path="safety_edu_land.${c}.${i}"></td>`;
        });
        h += '</tr>';
      });
      h += '</tbody>';
      tgtC.innerHTML = h;
    }
    // 재해 / Near Miss
    const tgtD = document.getElementById('ed-incident-inline');
    if (tgtD) {
      let h = '<thead><tr><th>공정구역</th><th>공상</th><th>일반재해</th><th>중대재해</th><th>일반NM</th><th>중대NM</th></tr></thead><tbody>';
      d.incident_summary.forEach((r, i) => {
        h += `<tr><td><b>${r.sub}</b></td>`;
        ['공상','일반재해','중대재해','일반NearMiss','중대NearMiss'].forEach(k => {
          h += `<td class="num"><input type="number" value="${r[k]}" data-path="incident_summary.${i}.${k}"></td>`;
        });
        h += '</tr>';
      });
      h += '</tbody>';
      tgtD.innerHTML = h;
    }
  }
}

function saveTabEdits(tabKey) {
  if (!requireEditAuth()) return;
  const root = document.querySelector(`.panel[data-tab="${tabKey}"]`);
  if (!root) return;
  const area = root.querySelector(`.inline-edit-area[data-edit="${tabKey}"]`);
  if (!area) return;
  area.querySelectorAll('input[data-path], select[data-path]').forEach(el => {
    let v = el.value;
    if (el.type === 'number') v = (v === '' ? null : parseFloat(v));
    setByPath(D(), el.dataset.path, v);
  });
  persistDashboardData();
  // Re-render all open tabs (이 탭은 물론 종합 대시보드도 즉시 반영)
  for (const k of openTabs) {
    const panel = document.querySelector(`.panel[data-tab="${k}"]`);
    if (!panel) continue;
    const wasEditOn = !!tabEditState[k];
    panel.innerHTML = PANELS[k]();
    setTimeout(() => {
      if (PANEL_INIT[k]) PANEL_INIT[k]();
      if (wasEditOn) tabEditState[k] = true;
    }, 30);
  }
  showToast('✅ 변경사항이 저장되어 모든 차트에 반영되었습니다');
}

//------------------------------------------------------------
// Overview — Executive 3-column layout (한 화면에 모두 노출)
//------------------------------------------------------------

// 'YYYY-MM' → 다음 달 'YYYY-MM'
function nextMonthKey(ym) {
  if (!ym) return '';
  const [y, m] = ym.split('-').map(Number);
  const d = new Date(y, m, 1); // m은 0-based의 다음 달
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

// 마일스톤을 우선순위로 정렬: 최근 날짜 우선, 진행중/착수 우선
function _msPickTop(arr, n) {
  const priorityOf = (m) => (m.status === '진행중' ? 0 : m.status === '착수' ? 1 : 2);
  return arr.slice().sort((a, b) => {
    const pa = priorityOf(a), pb = priorityOf(b);
    if (pa !== pb) return pa - pb;
    return (b.date || '').localeCompare(a.date || '');
  }).slice(0, n);
}

// 특이사항(코멘트) 자동 산출 — Top 3
function buildSpecialNotes() {
  const dAll = D();
  const d = D6();
  const lastIdx = lastValidIdx(d.progress.종합.actual);
  const items = [];

  // 1) 큰 음의 편차 = 위험
  let worst = null;
  ['육상부','해상부','154kV'].forEach(s => {
    const a = d.progress[s].actual[lastIdx];
    const p = d.progress[s].plan[lastIdx];
    if (a == null || p == null) return;
    const dev = a - p;
    if (worst == null || dev < worst.dev) worst = { sub: s, dev };
  });
  if (worst && worst.dev < -3) {
    const prio = worst.dev <= -5 ? 'high' : 'mid';
    const icon = prio === 'high' ? '🔴' : '🟡';
    items.push({
      prio,
      icon,
      text: `<b>${worst.sub}</b> 공정률 <b>${worst.dev.toFixed(1)}%p</b> 지연 — 만회 대책 / 인력 추가 투입 검토`
    });
  }

  // 2) 진행중/착수 마일스톤 중 가장 임박한 것
  const lastMonth = d.progress.months[lastIdx];
  const ongoing = (dAll.milestones || []).filter(m =>
    (m.status === '착수' || m.status === '진행중') && (m.date || '') >= (lastMonth || '')
  ).sort((a,b) => (a.date||'').localeCompare(b.date||''));
  if (ongoing[0]) {
    items.push({
      prio: 'mid',
      icon: '🟡',
      text: `진행 중 마일스톤 <b>${ongoing[0].title}</b> (${ongoing[0].date}) — 진척 점검 필요`
    });
  }

  // 3) 차월 첫 계획
  const nextPlan = (dAll.next_month_plan || []).slice().sort((a,b) => (a.date||'').localeCompare(b.date||''));
  if (nextPlan[0]) {
    items.push({
      prio: 'low',
      icon: '🟢',
      text: `차월 첫 마일스톤 <b>${nextPlan[0].title}</b> (${nextPlan[0].date}) — 자원 배정 사전 검토`
    });
  }

  // 보충: 안전 = 중대재해 0건이면 칭찬, >0이면 위험
  const inc = d.incident_summary || [];
  const totalSerious = inc.reduce((s,r) => s + (r.중대재해 || 0), 0);
  if (totalSerious > 0 && items.length < 3) {
    items.unshift({
      prio: 'high',
      icon: '🔴',
      text: `중대재해 <b>${totalSerious}건</b> 발생 — 즉시 안전 대책 회의 소집`
    });
  }

  return items.slice(0, 3);
}

// 무재해 일수 다음 마일스톤(365/730/1095/1460/1825일)까지 남은 일수
function _safetyMilestone(days) {
  if (days == null) return null;
  const targets = [365, 730, 1095, 1460, 1825, 2190];
  for (const t of targets) {
    if (days < t) return { target: t, remain: t - days, pct: Math.min(100, days / t * 100) };
  }
  return { target: 2190, remain: 0, pct: 100 };
}

// 마일스톤 카드 1개 HTML
function _msCardHtml(item, opts) {
  // opts: { type: 'current' | 'next' }
  const status = item.status || '';
  let cls = 'info';
  let cat = item.공종 || (item.sub || '').split('-')[1] || '계획';
  if (status === '완료') { cls = 'ok'; cat = item.공종 || '완료'; }
  else if (status === '진행중') { cls = 'warn'; cat = item.공종 || '진행중'; }
  else if (status === '착수') { cls = 'info'; cat = item.공종 || '착수'; }
  if (opts && opts.type === 'next') { cls = 'info'; }

  const date = item.date || '';
  const title = item.title || '';
  const sub = item.sub || '';
  const subBadge = sub ? `<span style="font-size:9.5px;color:var(--text-soft);">· ${sub}</span>` : '';
  const statusBadge = status ? `<span style="font-size:9.5px;color:var(--text-soft);">· ${status}</span>` : '';

  return `
    <div class="ov-ms-item ${cls}">
      <div class="ov-ms-item-top">
        <span class="ov-ms-item-cat">${cat}</span>
        ${subBadge}
        <span class="ov-ms-item-date">${date}</span>
      </div>
      <div class="ov-ms-item-title">${title}</div>
      ${statusBadge ? `<div class="ov-ms-item-meta">${statusBadge}</div>` : ''}
    </div>
  `;
}

PANEL_INIT.progress = () => {
  bindTabToolbar('progress');
  const d = D10();
  const months = d.progress.months;
  const monthsShort = months.map(fmtMonthCompact);

  destroyChart('pg-sub');
  charts['pg-sub'] = new Chart(document.getElementById('pg-sub'), {
    data: {
      labels: monthsShort,
      datasets: [
        { type: 'line', label: '종합 계획', data: d.progress.종합.plan, borderColor: '#5a6677', borderDash: [4,3], borderWidth: 2.5, pointRadius: 3, pointBackgroundColor: '#5a6677' },
        { type: 'line', label: '종합 실적', data: d.progress.종합.actual, borderColor: '#2c569f', borderWidth: 4, pointRadius: 5, pointBackgroundColor: '#2c569f', backgroundColor: 'rgba(36,74,130,0.10)', fill: false },
        { type: 'line', label: '육상 계획', data: d.progress.육상부.plan, borderColor: '#4a7bd1', borderDash: [6,4], borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#4a7bd1' },
        { type: 'line', label: '육상 실적', data: d.progress.육상부.actual, borderColor: '#4a7bd1', borderWidth: 3, pointRadius: 4, pointBackgroundColor: '#4a7bd1' },
        { type: 'line', label: '해상 계획', data: d.progress.해상부.plan, borderColor: '#6ba8c0', borderDash: [6,4], borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#6ba8c0' },
        { type: 'line', label: '해상 실적', data: d.progress.해상부.actual, borderColor: '#6ba8c0', borderWidth: 3, pointRadius: 4, pointBackgroundColor: '#6ba8c0' },
        { type: 'line', label: '154kV 계획', data: d.progress["154kV"].plan, borderColor: '#d49462', borderDash: [6,4], borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#d49462' },
        { type: 'line', label: '154kV 실적', data: d.progress["154kV"].actual, borderColor: '#d49462', borderWidth: 3, pointRadius: 4, pointBackgroundColor: '#d49462' }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11 } } }, tooltip: { mode: 'index', intersect: false } },
      scales: { y: { min: 50, max: 102, ticks: { callback: v => v + '%' } }, x: { grid: { display: false } } }
    }
  });

  // Deviation chart
  destroyChart('pg-deviation');
  const subs = ['종합','육상부','해상부','154kV'];
  charts['pg-deviation'] = new Chart(document.getElementById('pg-deviation'), {
    type: 'bar',
    data: {
      labels: monthsShort,
      datasets: subs.map((s) => ({
        label: s,
        data: d.progress[s].actual.map((a,j) => {
          const p = d.progress[s].plan[j];
          if (a == null || p == null) return null;
          return +(a - p).toFixed(2);
        }),
        backgroundColor: SUB_COLORS[s],
        borderRadius: 3,
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom' }, tooltip: { mode: 'index', intersect: false } },
      scales: { y: { title: { display: true, text: '편차(%p)' } }, x: { grid: { display: false } } }
    }
  });

  // MoM velocity chart (delta from previous month)
  destroyChart('pg-velocity');
  charts['pg-velocity'] = new Chart(document.getElementById('pg-velocity'), {
    type: 'bar',
    data: {
      labels: monthsShort,
      datasets: subs.map((s) => ({
        label: s,
        data: d.progress[s].actual.map((v, i, arr) => {
          if (i === 0 || v == null || arr[i-1] == null) return null;
          return +(v - arr[i-1]).toFixed(2);
        }),
        backgroundColor: SUB_COLORS[s] + 'cc',
        borderColor: SUB_COLORS[s],
        borderWidth: 1,
        borderRadius: 3,
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom' }, tooltip: { mode: 'index', intersect: false } },
      scales: { y: { title: { display: true, text: 'MoM 증분 (%p)' }, beginAtZero: true }, x: { grid: { display: false } } }
    }
  });

  // Heatmap (월 × 공정구역 → 실적 %)
  const heatRoot = document.getElementById('pg-heatmap');
  if (heatRoot) {
    let h = '<table style="border-collapse: collapse; width: 100%; font-size: 12px;"><thead><tr><th style="padding:6px; background:#f1f5f9; border:1px solid #e2e8f0;">공정구역</th>';
    monthsShort.forEach(m => {
      h += `<th style="padding:6px; background:#f1f5f9; border:1px solid #e2e8f0; min-width: 56px;">${m}</th>`;
    });
    h += '</tr></thead><tbody>';
    subs.forEach(s => {
      h += `<tr><td style="padding:6px; background:#f8fafc; border:1px solid #e2e8f0; font-weight: 600;">${s}</td>`;
      d.progress[s].actual.forEach((v, i) => {
        if (v == null) {
          h += `<td style="padding:6px; border:1px solid #e2e8f0; color:#94a3b8; text-align:center;">-</td>`;
        } else {
          const pct = v / 100;
          // Color: low=red, mid=yellow, high=green
          let bg;
          if (pct < 0.5) bg = '#fee2e2';
          else if (pct < 0.7) bg = '#fef3c7';
          else if (pct < 0.85) bg = '#fef9c3';
          else if (pct < 0.95) bg = '#dcfce7';
          else bg = '#bbf7d0';
          h += `<td style="padding:6px; border:1px solid #e2e8f0; background:${bg}; text-align:center; font-weight: 500;">${v.toFixed(1)}</td>`;
        }
      });
      h += '</tr>';
    });
    h += '</tbody></table>';
    heatRoot.innerHTML = h;
  }

  // Table
  const tbl = document.getElementById('pg-table');
  let html = '<thead><tr><th>월</th><th>구분</th><th>계획</th><th>실적</th><th>편차</th></tr></thead><tbody>';
  subs.forEach(s => {
    months.forEach((m,i) => {
      const p = d.progress[s].plan[i], a = d.progress[s].actual[i];
      if (p == null && a == null) return;
      const dev = (a == null || p == null) ? null : (a-p).toFixed(2);
      const cls = dev == null ? '' : (dev >= 0 ? 'badge-done' : 'badge-plan');
      html += `<tr><td>${fmtMonthCompact(m)}</td><td><b>${s}</b></td><td>${p == null ? '-' : p.toFixed(2)}</td><td>${a == null ? '-' : a.toFixed(2)}</td><td>${dev == null ? '-' : `<span class="badge ${cls}">${dev}</span>`}</td></tr>`;
    });
  });
  html += '</tbody>';
  tbl.innerHTML = html;
};

  destroyChart('rs-ratio');
  const ratios = months.map((_, i) => {
    const mg = ['육상부','해상부','154kV'].reduce((s,k) => s + (d.manpower[k].manager[i] ?? 0), 0);
    const pt = ['육상부','해상부','154kV'].reduce((s,k) => s + (d.manpower[k].partner[i] ?? 0), 0);
    const tot = mg + pt;
    return tot > 0 ? +(mg / tot * 100).toFixed(2) : null;
  });
  charts['rs-ratio'] = new Chart(document.getElementById('rs-ratio'), {
    type: 'line',
    data: {
      labels: monthsShort,
      datasets: [
        { label: '관리자 비율 (%)', data: ratios, borderColor: '#c25656', backgroundColor: 'rgba(194,86,86,0.20)', fill: true, tension: 0.3, pointRadius: 4, pointBackgroundColor: '#c25656', borderWidth: 2.5 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom' } },
      scales: { y: { beginAtZero: true, title: { display: true, text: '관리자 비율(%)' }, ticks: { callback: v => v + '%' } }, x: { grid: { display: false } } }
    }
  });

  // Sub-share over time (% per sub)
  destroyChart('rs-share');
  const monthlyTotals = months.map((_, i) => ['육상부','해상부','154kV'].reduce((s,k) => s + (d.manpower[k].manager[i] ?? 0) + (d.manpower[k].partner[i] ?? 0), 0));
  const sharePct = (sub) => months.map((_, i) => {
    const t = monthlyTotals[i];
    if (!t) return null;
    return +(((d.manpower[sub].manager[i] ?? 0) + (d.manpower[sub].partner[i] ?? 0)) / t * 100).toFixed(1);
  });
  charts['rs-share'] = new Chart(document.getElementById('rs-share'), {
    type: 'bar',
    data: {
      labels: monthsShort,
      datasets: [
        { label: '육상부', data: sharePct('육상부'), backgroundColor: '#2563eb', stack: 's' },
        { label: '해상부', data: sharePct('해상부'), backgroundColor: '#10b981', stack: 's' },
        { label: '154kV', data: sharePct('154kV'), backgroundColor: '#f59e0b', stack: 's' }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom' } },
      scales: { y: { stacked: true, beginAtZero: true, max: 100, ticks: { callback: v => v + '%' } }, x: { stacked: true, grid: { display: false } } }
    }
  });

  // Manpower heatmap (월 × 공정구역 → 총 인원)
  const heatRoot = document.getElementById('rs-heatmap');
  if (heatRoot) {
    const cellByMonth = (sub) => months.map((_, i) => (d.manpower[sub].manager[i] ?? 0) + (d.manpower[sub].partner[i] ?? 0));
    const subValues = ['육상부','해상부','154kV'];
    let maxVal = 0;
    subValues.forEach(s => cellByMonth(s).forEach(v => { if (v > maxVal) maxVal = v; }));
    let h = '<table style="border-collapse: collapse; width: 100%; font-size: 12px;"><thead><tr><th style="padding:6px; background:#f1f5f9; border:1px solid #e2e8f0;">공정구역</th>';
    monthsShort.forEach(m => {
      h += `<th style="padding:6px; background:#f1f5f9; border:1px solid #e2e8f0; min-width: 56px;">${m}</th>`;
    });
    h += '<th style="padding:6px; background:#f1f5f9; border:1px solid #e2e8f0;">합계</th></tr></thead><tbody>';
    subValues.forEach(s => {
      const vals = cellByMonth(s);
      const total = vals.reduce((a,b) => a+b, 0);
      h += `<tr><td style="padding:6px; background:#f8fafc; border:1px solid #e2e8f0; font-weight: 600;">${s}</td>`;
      vals.forEach(v => {
        if (!v) {
          h += `<td style="padding:6px; border:1px solid #e2e8f0; color:#94a3b8; text-align:center;">-</td>`;
        } else {
          const ratio = v / maxVal;
          const r = Math.round(255 - (255 - 37) * ratio);
          const g = Math.round(255 - (255 - 99) * ratio);
          const b = Math.round(255 - (255 - 235) * ratio);
          const txtColor = ratio > 0.5 ? '#fff' : '#1e3a8a';
          h += `<td style="padding:6px; border:1px solid #e2e8f0; background:rgb(${r},${g},${b}); color:${txtColor}; text-align:center; font-weight: 500;">${v}</td>`;
        }
      });
      h += `<td style="padding:6px; border:1px solid #e2e8f0; background:#fef9c3; text-align:center; font-weight: 600;">${total}</td>`;
      h += '</tr>';
    });
    // total row
    h += '<tr><td style="padding:6px; background:#f8fafc; border:1px solid #e2e8f0; font-weight: 600;">합계</td>';
    monthlyTotals.forEach(t => {
      h += `<td style="padding:6px; border:1px solid #e2e8f0; background:#fef9c3; text-align:center; font-weight: 600;">${t || '-'}</td>`;
    });
    h += `<td style="padding:6px; border:1px solid #e2e8f0; background:#fde68a; text-align:center; font-weight: 700;">${monthlyTotals.reduce((a,b) => a+b, 0)}</td>`;
    h += '</tr></tbody></table>';
    heatRoot.innerHTML = h;
  }

  // Detail table
  const tbl = document.getElementById('rs-table');
  let html = '<thead><tr><th>월</th><th>구분</th><th>관리자</th><th>협력사</th><th>합계</th></tr></thead><tbody>';
  ['종합','육상부','해상부','154kV'].forEach(s => {
    months.forEach((m,i) => {
      const mg = d.manpower[s].manager[i], pt = d.manpower[s].partner[i];

    });
  });
  html += '</tbody>';
  tbl.innerHTML = html;
};

// Photos
//------------------------------------------------------------
let currentPhotoFilter = { year: 'all', month: 'all', category: 'all', type: 'all' };
let currentPhotoSet = []; // for lightbox navigation
let currentPhotoIdx = 0;

// 월 키 헬퍼 (2025-06 형식 / 06월 / 12월 / 2026-01)
function _monthYear(key) {
  // YYYY-MM 형식
  const m = String(key).match(/^(\d{4})-(\d{2})$/);
  if (m) return { year: m[1], month: m[2], yearShort: m[1].slice(2) };
  // 호환: "06월" 등 단순 월
  const m2 = String(key).match(/^(\d{2})월$/);
  if (m2) return { year: '?', month: m2[1], yearShort: '??' };
  return { year: '?', month: '??', yearShort: '??' };
}
function _monthLabel(key) {
  const { year, month, yearShort } = _monthYear(key);
  if (year === '?') return key;
  return `'${yearShort}.${parseInt(month, 10)}월`;
}
function _quarterOf(key) {
  const { month } = _monthYear(key);
  const m = parseInt(month, 10);
  if (m <= 3) return 'Q1'; if (m <= 6) return 'Q2'; if (m <= 9) return 'Q3'; return 'Q4';
}

PANELS.photos = () => {
  const months = Object.keys(window.PHOTOS_DATA).sort();
  // Group months by year
  const yearGroups = {};
  months.forEach(m => {
    const y = _monthYear(m).year;
    if (!yearGroups[y]) yearGroups[y] = [];
    yearGroups[y].push(m);
  });
  const years = Object.keys(yearGroups).sort();
  // 디폴트 연도가 데이터에 없으면 전체로
  if (currentPhotoFilter.year !== 'all' && !yearGroups[currentPhotoFilter.year]) {
    currentPhotoFilter.year = 'all';
  }

  // 선택된 연도의 월 목록
  const visibleMonths = currentPhotoFilter.year === 'all'
    ? months
    : (yearGroups[currentPhotoFilter.year] || []);

  return `
    <div class="photo-toolbar">
      <strong style="color:var(--text); margin-right:8px; font-weight:600;">📆 연도</strong>
      <button data-filter="year" data-val="all" class="${currentPhotoFilter.year==='all'?'active':''}">전체</button>
      ${years.map(y => `<button data-filter="year" data-val="${y}" class="${currentPhotoFilter.year===y?'active':''}">${y}년</button>`).join('')}
      <span style="width: 16px;"></span>
      <strong style="color:var(--text); margin-right:8px; font-weight:600;">📅 월</strong>
      <button data-filter="month" data-val="all" class="${currentPhotoFilter.month==='all'?'active':''}">전체</button>
      ${visibleMonths.map(m => `<button data-filter="month" data-val="${m}" class="${currentPhotoFilter.month===m?'active':''}">${_monthLabel(m)}</button>`).join('')}
    </div>
    <div class="photo-toolbar" style="border-top:1px solid var(--border);">
      <strong style="color:var(--text); margin-right:8px; font-weight:600;">🏷️ 분류</strong>
      <button data-filter="category" data-val="all" class="${currentPhotoFilter.category==='all'?'active':''}">전체</button>
      <button data-filter="category" data-val="육상부" class="${currentPhotoFilter.category==='육상부'?'active':''}">육상부</button>
      <button data-filter="category" data-val="해상부" class="${currentPhotoFilter.category==='해상부'?'active':''}">해상부</button>
      <button data-filter="category" data-val="154kV" class="${currentPhotoFilter.category==='154kV'?'active':''}">154kV</button>
      <span style="width: 16px;"></span>
      <strong style="color:var(--text); margin-right:8px; font-weight:600;">📑 유형</strong>
      <button data-filter="type" data-val="all" class="${currentPhotoFilter.type==='all'?'active':''}">전체</button>
      <button data-filter="type" data-val="공사사진" class="${currentPhotoFilter.type==='공사사진'?'active':''}">공사/공정</button>
      <button data-filter="type" data-val="공정사진" class="${currentPhotoFilter.type==='공정사진'?'active':''}">공정사진</button>
      <button data-filter="type" data-val="안전점검" class="${currentPhotoFilter.type==='안전점검'?'active':''}">안전점검</button>
      <span style="width: 16px;"></span>
      <button id="photo-edit-toggle" style="background:var(--success-soft); border-color:var(--success-border); color:var(--success);">🔒 편집모드 OFF</button>
      <span style="margin-left:auto; color:var(--text-muted); font-size:11px;" id="photo-count"></span>
    </div>
    <div id="photo-content"></div>
  `;
};
let photoEditMode = false;

PANEL_INIT.photos = () => {
  const root = document.querySelector('.panel[data-tab="photos"]');
  root.querySelectorAll('.photo-toolbar button[data-filter]').forEach(b => {
    b.onclick = () => {
      const f = b.dataset.filter, v = b.dataset.val;
      currentPhotoFilter[f] = v;
      // 연도 변경 시 월 필터 초기화
      if (f === 'year') currentPhotoFilter.month = 'all';
      // 연도 변경 시는 toolbar 전체 재렌더 (월 버튼 목록이 바뀜)
      if (f === 'year') {
        root.innerHTML = PANELS.photos();
        PANEL_INIT.photos();
        return;
      }
      root.querySelectorAll(`.photo-toolbar button[data-filter="${f}"]`).forEach(x => x.classList.toggle('active', x.dataset.val === v));
      renderPhotoGallery();
    };
  });
  const editBtn = root.querySelector('#photo-edit-toggle');
  if (editBtn) {
    editBtn.onclick = () => {
      const turningOn = !photoEditMode;
      if (turningOn && !requireEditAuth()) return;
      photoEditMode = turningOn;
      editBtn.textContent = photoEditMode ? '✏️ 편집모드 ON' : '🔒 편집모드 OFF';
      editBtn.style.background = photoEditMode ? 'var(--primary)' : 'var(--success-soft)';
      editBtn.style.borderColor = photoEditMode ? 'var(--primary)' : 'var(--success-border)';
      editBtn.style.color = photoEditMode ? '#fff' : 'var(--success)';
      renderPhotoGallery();
    };
  }
  if (!currentPhotoFilter.type) currentPhotoFilter.type = 'all';
  renderPhotoGallery();
};

function renderPhotoGallery() {
  const wrap = document.getElementById('photo-content');
  if (!wrap) return;
  const data = window.PHOTOS_DATA;
  let html = '';
  let allItems = [];
  let count = 0;
  Object.keys(data).sort().forEach(month => {
    // 연도 필터
    if (currentPhotoFilter.year && currentPhotoFilter.year !== 'all') {
      if (_monthYear(month).year !== currentPhotoFilter.year) return;
    }
    if (currentPhotoFilter.month !== 'all' && currentPhotoFilter.month !== month) return;
    data[month].forEach((section, secIdx) => {
      if (currentPhotoFilter.category !== 'all' && currentPhotoFilter.category !== section.category) return;
      if (currentPhotoFilter.type && currentPhotoFilter.type !== 'all' && currentPhotoFilter.type !== section.type) return;
      html += `<div class="photo-section">
        <h2>${section.title} <span style="color:var(--text-muted); font-weight:500; font-size:12px;">(${section.items.length}장)</span></h2>
        <div class="photo-grid">`;
      section.items.forEach((item, itemIdx) => {
        const idx = allItems.length;
        allItems.push({ file: item.file, caption: item.caption, section: section.title, month, secIdx, itemIdx });
        const safeCap = (item.caption || '').replace(/"/g, '&quot;').replace(/</g, '&lt;');
        const cardClick = photoEditMode ? '' : `onclick="openLightbox(${idx})"`;
        const delBtn = photoEditMode ? `<button class="delete-btn" title="사진 삭제" onclick="event.stopPropagation(); deletePhoto('${month}', ${secIdx}, ${itemIdx})">🗑</button>` : '';
        const imgSrc = item.file.startsWith('data:') ? item.file : encodeURI(item.file);
        html += `
          <div class="photo-card" ${cardClick}>
            <div class="thumb">${delBtn}<img loading="lazy" src="${imgSrc}" alt="" onerror="this.style.opacity=0.3; this.alt='이미지 없음';"></div>
            <div class="caption" data-month="${month}" data-sec="${secIdx}" data-item="${itemIdx}">
              <span class="caption-text">${safeCap}</span>
              <button class="caption-edit-btn" title="캡션 수정" onclick="event.stopPropagation(); editCaption(this)">✏️</button>
            </div>
          </div>`;
        count++;
      });
      html += `</div></div>`;
    });
  });
  wrap.innerHTML = html || '<div style="padding:40px; text-align:center; color:var(--text-muted);">조건에 맞는 사진이 없습니다.</div>';
  currentPhotoSet = allItems;
  const cnt = document.getElementById('photo-count');
  if (cnt) cnt.textContent = `총 ${count}장`;
}

function editCaption(btn) {
  if (!requireEditAuth()) return;
  const cap = btn.parentElement;
  const month = cap.dataset.month;
  const secIdx = +cap.dataset.sec;
  const itemIdx = +cap.dataset.item;
  const item = window.PHOTOS_DATA[month][secIdx].items[itemIdx];
  cap.innerHTML = `
    <textarea class="caption-input" rows="3">${(item.caption || '').replace(/</g, '&lt;')}</textarea>
    <div class="caption-actions">
      <button onclick="event.stopPropagation(); saveCaption(this, '${month}', ${secIdx}, ${itemIdx})">💾 저장</button>
      <button class="cancel" onclick="event.stopPropagation(); renderPhotoGallery()">취소</button>
    </div>
  `;
  const ta = cap.querySelector('textarea');
  ta.focus();
  ta.onclick = e => e.stopPropagation();
}

function saveCaption(btn, month, secIdx, itemIdx) {
  const ta = btn.parentElement.parentElement.querySelector('textarea');
  const newCap = ta.value.trim();
  window.PHOTOS_DATA[month][secIdx].items[itemIdx].caption = newCap;
  persistPhotosData();
  renderPhotoGallery();
  showToast('✅ 캡션이 수정되었습니다');
}

function deletePhoto(month, secIdx, itemIdx) {
  if (!requireEditAuth()) return;
  const item = window.PHOTOS_DATA[month][secIdx].items[itemIdx];
  if (!confirm(`이 사진을 삭제하시겠습니까?\n\n캡션: ${item.caption}`)) return;
  window.PHOTOS_DATA[month][secIdx].items.splice(itemIdx, 1);
  persistPhotosData();
  renderPhotoGallery();
  if (typeof renderUploadStats === 'function') renderUploadStats();
  showToast('🗑 사진이 삭제되었습니다');
}

function openLightbox(i) {
  currentPhotoIdx = i;
  const it = currentPhotoSet[i];
  const src = it.file.startsWith('data:') ? it.file : encodeURI(it.file);
  document.getElementById('lb-img').src = src;
  document.getElementById('lb-caption').textContent = `${it.section}  |  ${it.caption}`;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('show'); }
function navLightbox(dir) {
  currentPhotoIdx = (currentPhotoIdx + dir + currentPhotoSet.length) % currentPhotoSet.length;
  openLightbox(currentPhotoIdx);
}
document.getElementById('lightbox').addEventListener('click', e => { if (e.target.id === 'lightbox') closeLightbox(); });
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('show')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

//------------------------------------------------------------
// Photos persistence (localStorage)
//------------------------------------------------------------
const PHOTOS_STORAGE_KEY = 'gwangyang_lng_photos_v2'; // v2: YYYY-MM 키 형식 통일

function persistPhotosData() {
  try {
    const json = JSON.stringify(window.PHOTOS_DATA);
    localStorage.setItem(PHOTOS_STORAGE_KEY, json);
  } catch (err) {
    console.warn('localStorage 저장 실패 (용량 초과 가능):', err);
    showToast('⚠️ localStorage 저장 실패 — 용량이 초과되었을 수 있습니다');
  }
}

function loadPhotosFromStorage() {
  try {
    const raw = localStorage.getItem(PHOTOS_STORAGE_KEY);
    if (!raw) return false;
    const stored = JSON.parse(raw);
    if (stored && typeof stored === 'object') {
      window.PHOTOS_DATA = stored;
      return true;
    }
  } catch (err) {
    console.warn('localStorage 복원 실패:', err);
  }
  return false;
}

const _ORIGINAL_PHOTOS_DATA = JSON.parse(JSON.stringify(window.PHOTOS_DATA));
loadPhotosFromStorage();

//------------------------------------------------------------
// Photo Upload / Manage
//------------------------------------------------------------
let uploadQueue = []; // { name, dataUrl, caption }

PANELS.upload = () => {
  const months = Object.keys(window.PHOTOS_DATA).sort();
  const monthOpts = months.map(m => `<option value="${m}">${_monthLabel(m)} (${m})</option>`).join('');
  return `
    <div class="upload-stats" id="upload-stats"></div>

    <div class="upload-form">
      <h3>📤 새 사진 업로드</h3>
      <div class="upload-row">
        <div class="upload-field">
          <label>월 <span style="color:#fca5a5">*</span></label>
          <select id="up-month">
            ${monthOpts}
            <option value="__new__">＋ 새 월 추가...</option>
          </select>
        </div>
        <div class="upload-field" id="up-newmonth-wrap" style="display:none;">
          <label>새 월 이름 (예: 2026-04)</label>
          <input type="text" id="up-newmonth" placeholder="2026-04">

        <div class="upload-field">
          <label>분류 <span style="color:#fca5a5">*</span></label>

          </select>
        </div>
        <div class="upload-field">
          <label>유형 <span style="color:#fca5a5">*</span></label>
          <select id="up-type">
            <option value="공사사진">공사사진</option>
            <option value="공정사진">공정사진</option>
            <option value="안전점검">안전점검</option>
          </select>
        </div>
        <div class="upload-field" style="flex:2;">
          <label>섹션 제목 (자동 생성됨, 수정 가능)</label>
          <input type="text" id="up-title" placeholder="자동 생성">
        </div>
      </div>

      <div class="drop-zone" id="drop-zone">
        <div class="dz-icon">📁</div>
        <div>여기에 사진 파일을 끌어 놓거나 클릭해서 선택하세요</div>
        <div class="dz-hint">JPG, PNG, JPEG (다중 선택 가능)</div>
      </div>
      <input type="file" id="file-input" accept="image/*" multiple style="display:none;">

      <div class="upload-queue" id="upload-queue"></div>

      <div class="upload-actions">
        <button id="btn-upload-add">✅ 선택한 사진을 갤러리에 추가</button>
        <button class="secondary" id="btn-clear-queue">🗑 대기열 비우기</button>
      </div>
    </div>

    <div class="upload-form">
      <h3>💾 데이터 복원</h3>
      <div style="font-size:12.5px; color:var(--text-muted); margin-bottom:12px; line-height:1.6;">
        업로드된 사진과 수정된 캡션은 브라우저 저장소(localStorage)에 자동 저장됩니다.<br>
        문제가 생기면 아래 버튼으로 원본 데이터로 되돌릴 수 있습니다.
      </div>
      <div class="upload-actions">
        <button class="danger" onclick="resetPhotosData()">↻ 원본 사진 데이터로 복원</button>
      </div>
    </div>
  `;
};

PANEL_INIT.upload = () => {
  const root = document.querySelector('.panel[data-tab="upload"]');
  const monthSel = root.querySelector('#up-month');
  const newWrap = root.querySelector('#up-newmonth-wrap');
  const titleInput = root.querySelector('#up-title');
  const categorySel = root.querySelector('#up-category');
  const typeSel = root.querySelector('#up-type');

  const updateAutoTitle = () => {
    const m = monthSel.value === '__new__' ? (root.querySelector('#up-newmonth').value || '신규') : monthSel.value;
    const c = categorySel.value;
    const typeLabel = typeSel.value === '안전점검' ? '안전점검 사진' : (typeSel.value === '공사사진' ? '공사 사진' : '공정사진');
    const subLabel = c === '154kV' ? '154kV 수전공사' : (c === '해상부' ? '항만공사' : c);
    titleInput.value = `${typeLabel} (${subLabel}) - ${m}`;
  };
  monthSel.onchange = () => {
    newWrap.style.display = monthSel.value === '__new__' ? 'flex' : 'none';
    updateAutoTitle();
  };
  root.querySelector('#up-newmonth').oninput = updateAutoTitle;
  categorySel.onchange = updateAutoTitle;
  typeSel.onchange = updateAutoTitle;
  updateAutoTitle();

  const dz = root.querySelector('#drop-zone');
  const fi = root.querySelector('#file-input');
  dz.onclick = () => fi.click();
  dz.ondragover = e => { e.preventDefault(); dz.classList.add('dragover'); };
  dz.ondragleave = () => dz.classList.remove('dragover');
  dz.ondrop = e => {
    e.preventDefault();
    dz.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  };
  fi.onchange = () => handleFiles(fi.files);

  root.querySelector('#btn-upload-add').onclick = commitUploadQueue;
  root.querySelector('#btn-clear-queue').onclick = () => {
    if (uploadQueue.length === 0) return;
    if (!confirm('대기열을 비우시겠습니까?')) return;
    uploadQueue = [];
    renderUploadQueue();
  };

  renderUploadQueue();
  renderUploadStats();
};

function handleFiles(fileList) {
  const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
  if (files.length === 0) {
    showToast('⚠️ 이미지 파일만 업로드 가능합니다');
    return;
  }
  let pending = files.length;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      uploadQueue.push({
        name: file.name,
        dataUrl: e.target.result,
        caption: file.name.replace(/\.[^.]+$/, '')
      });
      pending--;
      if (pending === 0) renderUploadQueue();
    };
    reader.readAsDataURL(file);
  });
}

function renderUploadQueue() {
  const wrap = document.getElementById('upload-queue');
  if (!wrap) return;
  if (uploadQueue.length === 0) {
    wrap.innerHTML = '<div style="padding:14px; text-align:center; color:#666; font-size:12px;">선택된 사진이 없습니다</div>';
    return;
  }
  wrap.innerHTML = uploadQueue.map((q, i) => `
    <div class="upload-queue-item">
      <img src="${q.dataUrl}" alt="">
      <div class="meta">
        <div class="fname">${q.name}</div>
        <input type="text" placeholder="캡션 입력 (예: 작업 내용 ('26.04.01))" value="${(q.caption || '').replace(/"/g, '&quot;')}" onchange="uploadQueue[${i}].caption=this.value">
      </div>
      <button class="remove-q" onclick="uploadQueue.splice(${i},1); renderUploadQueue();">제거</button>
    </div>
  `).join('');
}

function commitUploadQueue() {
  if (uploadQueue.length === 0) {
    showToast('⚠️ 추가할 사진이 없습니다');
    return;
  }
  if (!requireEditAuth()) return;
  const root = document.querySelector('.panel[data-tab="upload"]');
  let month = root.querySelector('#up-month').value;
  if (month === '__new__') {
    month = (root.querySelector('#up-newmonth').value || '').trim();
    if (!month) { alert('새 월 이름을 입력하세요'); return; }
    if (!window.PHOTOS_DATA[month]) window.PHOTOS_DATA[month] = [];
  }
  const category = root.querySelector('#up-category').value;
  const type = root.querySelector('#up-type').value;
  const title = root.querySelector('#up-title').value || `${type} (${category}) - ${month}`;

  let section = window.PHOTOS_DATA[month].find(s => s.category === category && s.type === type);
  if (!section) {
    section = { title, category, type, items: [] };
    window.PHOTOS_DATA[month].push(section);
  } else {
    section.title = title;
  }

  uploadQueue.forEach(q => {
    section.items.push({ file: q.dataUrl, caption: q.caption || '' });
  });

  const added = uploadQueue.length;
  uploadQueue = [];
  renderUploadQueue();
  persistPhotosData();
  renderUploadStats();
  reloadPhotosTabIfOpen();
  showToast(`✅ ${added}장의 사진이 추가되었습니다`);
}

function renderUploadStats() {
  const wrap = document.getElementById('upload-stats');
  if (!wrap) return;
  let total = 0, sections = 0;
  const byMonth = {};
  Object.keys(window.PHOTOS_DATA).forEach(m => {
    let mc = 0;
    window.PHOTOS_DATA[m].forEach(s => {
      sections++;
      mc += s.items.length;
    });
    byMonth[m] = mc;
    total += mc;
  });
  wrap.innerHTML = `
    <div class="upload-stat"><div class="v">${total}</div><div class="l">전체 사진</div></div>
    <div class="upload-stat"><div class="v">${Object.keys(window.PHOTOS_DATA).length}</div><div class="l">월</div></div>
    <div class="upload-stat"><div class="v">${sections}</div><div class="l">섹션</div></div>
    ${Object.entries(byMonth).map(([m,c]) => `<div class="upload-stat"><div class="v">${c}</div><div class="l">${m}</div></div>`).join('')}
  `;
}

function reloadPhotosTabIfOpen() {
  if (!openTabs.has('photos')) return;
  const panel = document.querySelector('.panel[data-tab="photos"]');
  if (!panel) return;
  panel.innerHTML = PANELS.photos();
  setTimeout(() => PANEL_INIT.photos(), 30);
}

function exportPhotosData() {
  const blob = new Blob([JSON.stringify(window.PHOTOS_DATA, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `photos_data_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('💾 사진 데이터 JSON이 다운로드되었습니다');
}

function importPhotosData(ev) {
  if (!requireEditAuth()) { ev.target.value = ''; return; }
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (typeof data !== 'object' || Array.isArray(data)) throw new Error('형식이 올바르지 않습니다');
      window.PHOTOS_DATA = data;
      persistPhotosData();
      renderUploadStats();
      reloadPhotosTabIfOpen();
      showToast('📥 사진 데이터를 불러왔습니다');
    } catch (err) {
      alert('JSON 파일 읽기 실패: ' + err.message);
    }
  };
  reader.readAsText(file);
  ev.target.value = '';
}

function resetPhotosData() {
  if (!requireEditAuth()) return;
  if (!confirm('원본 사진 데이터로 복원하시겠습니까?\n업로드된 사진과 수정된 캡션이 모두 사라집니다.')) return;
  window.PHOTOS_DATA = JSON.parse(JSON.stringify(_ORIGINAL_PHOTOS_DATA));
  localStorage.removeItem(PHOTOS_STORAGE_KEY);
  renderUploadStats();
  reloadPhotosTabIfOpen();
  showToast('↻ 원본 사진 데이터로 복원되었습니다');
}

//------------------------------------------------------------
// Milestones
//------------------------------------------------------------
// Filter state for milestones panel
let _msFilter = { quarter: 'all', sub: 'all', status: 'all' };

function _msQuarterOf(dateStr) {
  // "2025-06-04" -> "2025 Q2"
  const [y, m] = dateStr.split('-');
  const q = Math.ceil(parseInt(m, 10) / 3);
  return `${y} Q${q}`;
}

PANELS.milestones = () => {
  const d = D();
  const all = d.milestones || [];
  // Compute available filters
  const quarters = Array.from(new Set(all.map(m => _msQuarterOf(m.date)))).sort();

PANEL_INIT.milestones = () => {
  const d = D();
  const all = d.milestones || [];

  // Render quarter chart
  const quarters = Array.from(new Set(all.map(m => _msQuarterOf(m.date)))).sort();
  const doneCounts = quarters.map(q => all.filter(m => _msQuarterOf(m.date) === q && m.status === '완료').length);
  const startCounts = quarters.map(q => all.filter(m => _msQuarterOf(m.date) === q && m.status === '착수').length);
  destroyChart('ms-quarter');
  charts['ms-quarter'] = new Chart(document.getElementById('ms-quarter'), {
    type: 'bar',
    data: {
      labels: quarters,
      datasets: [
        { label: '완료', data: doneCounts, backgroundColor: '#3d7a4a', stack: 's', borderRadius: 4 },
        { label: '착수', data: startCounts, backgroundColor: '#d49462', stack: 's', borderRadius: 4 },
        { type: 'line', label: '누적', data: quarters.map((_, i) => quarters.slice(0, i+1).reduce((s,q,idx) => s + doneCounts[idx] + startCounts[idx], 0)), borderColor: '#2c569f', borderWidth: 2.5, pointRadius: 4, pointBackgroundColor: '#2c569f', yAxisID: 'y1', tension: 0.3 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom' }, tooltip: { mode: 'index', intersect: false } },
      scales: {
        y: { stacked: true, beginAtZero: true, title: { display: true, text: '신규 마일스톤(건)' } },
        y1: { position: 'right', beginAtZero: true, grid: { display: false }, title: { display: true, text: '누적(건)' } },
        x: { stacked: true, grid: { display: false } }
      }
    }
  });

  // Render filtered table
  const renderMsTable = () => {
    let filtered = all;
    if (_msFilter.quarter !== 'all') filtered = filtered.filter(m => _msQuarterOf(m.date) === _msFilter.quarter);
    if (_msFilter.sub !== 'all') filtered = filtered.filter(m => m.sub === _msFilter.sub);
    if (_msFilter.status !== 'all') filtered = filtered.filter(m => m.status === _msFilter.status);

    const tbl = document.getElementById('ms-table');
    let html = '<thead><tr><th style="width:90px;">일자</th><th style="width:120px;">공정구역</th><th style="width:80px;">공종</th><th>주요 내용</th><th style="width:70px;">상태</th></tr></thead><tbody>';
    if (filtered.length === 0) {
      html += '<tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 20px;">조건에 맞는 마일스톤이 없습니다.</td></tr>';
    } else {
      filtered.forEach(m => {
        const cls = m.status === '완료' ? 'badge-done' : 'badge-start';
        html += `<tr><td>${m.date}</td><td>${m.sub}</td><td>${m.공종}</td><td>${m.title}</td><td><span class="badge ${cls}">${m.status}</span></td></tr>`;
      });
    }
    html += '</tbody>';
    tbl.innerHTML = html;
    const cnt = document.getElementById('ms-count');
    if (cnt) cnt.textContent = `${filtered.length} / ${all.length} 건`;
  };

  // Bind filter buttons
  const root = document.querySelector('.panel[data-tab="milestones"]');
  if (root) {
    root.querySelectorAll('.ms-btn').forEach(btn => {
      btn.style.cssText = 'padding: 4px 10px; font-size: 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); color: var(--text); cursor: pointer;';
      // initial active state
      if (btn.dataset.val === _msFilter[btn.dataset.filter]) {
        btn.style.background = 'var(--primary)';
        btn.style.color = '#fff';
        btn.style.borderColor = 'var(--primary)';
      }
      btn.onclick = () => {
        const f = btn.dataset.filter;
        _msFilter[f] = btn.dataset.val;
        // Update visual active
        root.querySelectorAll(`.ms-btn[data-filter="${f}"]`).forEach(b => {
          if (b.dataset.val === _msFilter[f]) {
            b.style.background = 'var(--primary)';
            b.style.color = '#fff';
            b.style.borderColor = 'var(--primary)';
          } else {
            b.style.background = 'var(--surface)';
            b.style.color = 'var(--text)';
            b.style.borderColor = 'var(--border)';
          }
        });
        renderMsTable();
      };
    });
  }
  renderMsTable();

  // Next month plan table
  const tbl2 = document.getElementById('ms-plan-table');
  let html2 = '<thead><tr><th>예정일</th><th>공종</th><th>주요 내용</th></tr></thead><tbody>';
  d.next_month_plan.forEach(p => {
    html2 += `<tr><td>${p.date}</td><td><span class="badge badge-plan">${p.공종}</span></td><td>${p.title}</td></tr>`;
  });
  html2 += '</tbody>';
  tbl2.innerHTML = html2;
};

// 비밀번호 입력 모달 (편집 인증)
function _promptEditorAuth() {
  const old = document.getElementById('ed-auth-modal');
  if (old) old.remove();
  const modal = document.createElement('div');
  modal.id = 'ed-auth-modal';
  modal.className = 'ed-auth-modal-back';
  modal.innerHTML = `
    <div class="ed-auth-box">
      <div class="ed-auth-icon">🔒</div>
      <h3>관리자 인증</h3>
      <div class="ed-auth-desc">
        데이터 편집은 관리자 전용입니다.<br>
        비밀번호를 입력해 주세요.
      </div>
      <input type="password" class="ed-auth-input" id="ed-auth-pwd"
             placeholder="비밀번호" autocomplete="off" maxlength="20">
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="ed-auth-btn secondary" id="ed-auth-cancel">취소</button>
        <button class="ed-auth-btn" id="ed-auth-ok">🔓 인증하기</button>
      </div>
      <div class="ed-auth-error" id="ed-auth-error"></div>
      <div class="ed-auth-hint">※ 인증은 현재 세션 동안 유지됩니다</div>
    </div>
  `;
  document.body.appendChild(modal);

  const input = modal.querySelector('#ed-auth-pwd');
  const err = modal.querySelector('#ed-auth-error');
  const close = () => modal.remove();
  const submit = () => {
    if (input.value === EDIT_PASSWORD) {
      __editAuthorized = true;
      showToast('🔓 편집 권한이 활성화되었습니다');
      close();
      _refreshEditorPanel();
    } else {
      err.textContent = '❌ 비밀번호가 올바르지 않습니다.';
      input.value = '';
      input.focus();
    }
  };
  modal.querySelector('#ed-auth-ok').onclick = submit;
  modal.querySelector('#ed-auth-cancel').onclick = close;
  modal.addEventListener('click', (e) => { if (e.target === modal) close(); });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); submit(); }
    if (e.key === 'Escape') { e.preventDefault(); close(); }
  });
  setTimeout(() => input.focus(), 50);
}

// === Month-slider editor — 좌우 슬라이드로 월 이동 ===
// Per-rootId state stored on a module-level Map so re-renders preserve selected month
const _msState = {};
function _msFindLastValid(months, fields) {
  for (let i = months.length - 1; i >= 0; i--) {
    if (fields.some(f => {
      const v = f.getValue(i);
      return v != null && !Number.isNaN(v);
    })) return i;
  }
  return months.length - 1;
}
function _renderMsEditor(opts) {
  const { rootId, months, fields, accent, gaps } = opts;
  const root = document.getElementById(rootId);
  if (!root) return;
  if (_msState[rootId] == null) _msState[rootId] = _msFindLastValid(months, fields);

  const draw = () => {
    let i = _msState[rootId];
    if (i >= months.length) i = months.length - 1;
    if (i < 0) i = 0;
    _msState[rootId] = i;

    const monthKey = months[i];
    const isGap = gaps && gaps.includes && gaps.includes(monthKey);
    const pct = months.length > 1 ? (i / (months.length - 1)) * 100 : 0;

    let h = `<div class="ms-bar" style="--ms-accent:${accent || 'var(--primary)'}">
      <button class="ms-nav" data-act="prev" ${i===0?'disabled':''} aria-label="이전">‹</button>
      <input type="range" class="ms-range" min="0" max="${months.length-1}" value="${i}" style="--pct:${pct}%">
      <button class="ms-nav" data-act="next" ${i===months.length-1?'disabled':''} aria-label="다음">›</button>
      <div class="ms-month">${monthKey}<span class="ms-pos${isGap?' gap':''}">(${i+1}/${months.length})${isGap?' · 누락':''}</span></div>
    </div>`;

    h += '<div class="ms-fields">';
    fields.forEach(f => {
      const v = f.getValue(i);
      const prevV = (i > 0) ? f.getValue(i - 1) : null;
      const path = f.getPath(i);
      const stepAttr = f.step ? `step="${f.step}"` : '';
      const valAttr = (v == null || Number.isNaN(v)) ? '' : v;
      const prevTxt = (prevV != null) ? `전월: ${prevV.toLocaleString()}` : '전월: —';
      h += `<div class="ms-field" style="--fc:${f.color || 'var(--primary)'}">
        <label>${f.label}</label>
        <input type="number" ${stepAttr} value="${valAttr}" placeholder="(없음)" data-path="${path}">
        <div class="ms-prev">${prevTxt}</div>
      </div>`;
    });
    h += '</div>';

    root.innerHTML = h;

    const range = root.querySelector('.ms-range');
    range.addEventListener('input', e => {
      _msState[rootId] = parseInt(e.target.value, 10);
      draw();
    });
    root.querySelector('[data-act="prev"]').addEventListener('click', () => {
      if (_msState[rootId] > 0) { _msState[rootId]--; draw(); }
    });
    root.querySelector('[data-act="next"]').addEventListener('click', () => {
      if (_msState[rootId] < months.length - 1) { _msState[rootId]++; draw(); }
    });
  };
  draw();
}

function renderEditorTables() {
  const d = D();
  const SUB_COLORS = { '종합':'#dc2626', '육상부':'#2563eb', '해상부':'#0891b2', '154kV':'#ea580c' };
  const gaps = (d.project && d.project.data_gaps) || [];

  // 1) 공정률 — 4 공정구역 × (계획·실적)
  {
    const months = d.progress.months;
    const fields = [];
    ['종합','육상부','해상부','154kV'].forEach(s => {
      fields.push({ label:`${s} 계획`, color:SUB_COLORS[s], step:0.01,
                    getValue:i => d.progress[s].plan[i],
                    getPath: i => `progress.${s}.plan.${i}` });
      fields.push({ label:`${s} 실적`, color:SUB_COLORS[s], step:0.01,
                    getValue:i => d.progress[s].actual[i],
                    getPath: i => `progress.${s}.actual.${i}` });
    });
    _renderMsEditor({ rootId:'ed-progress', months, fields, accent:'#2563eb', gaps });
  }

  // 2) 인력 투입 — 4 공정구역 × (관리자·협력사)
  {
    const months = d.manpower.months;
    const fields = [];
    ['종합','육상부','해상부','154kV'].forEach(s => {
      fields.push({ label:`${s} 관리자`, color:SUB_COLORS[s],
                    getValue:i => d.manpower[s].manager[i],
                    getPath: i => `manpower.${s}.manager.${i}` });
      fields.push({ label:`${s} 협력사`, color:SUB_COLORS[s],
                    getValue:i => d.manpower[s].partner[i],
                    getPath: i => `manpower.${s}.partner.${i}` });
    });
    _renderMsEditor({ rootId:'ed-manpower', months, fields, accent:'#2563eb', gaps });
  }

  // 3) 무재해 일수 — 3 공정구역
  {
    const months = d.no_accident_days.months;
    const fields = ['육상부','해상부','154kV'].map(s => ({
      label: s, color: SUB_COLORS[s],
      getValue: i => d.no_accident_days[s][i],
      getPath:  i => `no_accident_days.${s}.${i}`
    }));
    _renderMsEditor({ rootId:'ed-noacc', months, fields, accent:'#15803d', gaps });
  }

  // 4) 안전점검 지적 분류 (육상부) — 9 분류
  {
    const months = d.safety_audit_land.months;
    const cats = ['추락','전도','낙하/비래','감전','충돌/협착','붕괴/도괴','화재/폭발','질식','기타'];
    const palette = ['#dc2626','#ea580c','#d97706','#ca8a04','#65a30d','#0891b2','#2563eb','#7c3aed','#94a3b8'];
    const fields = cats.map((c, ci) => ({
      label: c, color: palette[ci],
      getValue: i => d.safety_audit_land[c][i],
      getPath:  i => `safety_audit_land.${c}.${i}`
    }));
    _renderMsEditor({ rootId:'ed-audit', months, fields, accent:'#dc2626', gaps });
  }

  // 5) 안전교육 누적 인원 (육상부) — 4 종
  {
    const months = d.safety_edu_land.months;
    const cats = ['채용/작업변경','특별교육','관리감독자','정기교육'];
    const palette = ['#2563eb','#0891b2','#ea580c','#15803d'];
    const fields = cats.map((c, ci) => ({
      label: c, color: palette[ci],
      getValue: i => d.safety_edu_land[c][i],
      getPath:  i => `safety_edu_land.${c}.${i}`
    }));
    _renderMsEditor({ rootId:'ed-edu', months, fields, accent:'#0891b2', gaps });
  }

  // Incident (그대로 — 5건의 단일 행 표)
  let h = '<thead><tr><th>공정구역</th><th>공상</th><th>일반재해</th><th>중대재해</th><th>일반NM</th><th>중대NM</th></tr></thead><tbody>';
  d.incident_summary.forEach((r, i) => {
    h += `<tr><td><b>${r.sub}</b></td>`;
    ['공상','일반재해','중대재해','일반NearMiss','중대NearMiss'].forEach(k => {
      h += `<td class="num"><input type="number" value="${r[k]}" data-path="incident_summary.${i}.${k}"></td>`;
    });
    h += '</tr>';
  });
  h += '</tbody>';
  document.getElementById('ed-incident').innerHTML = h;

  // Milestones
  renderMilestonesTable();
  renderPlanTable();
}

function renderMilestonesTable() {
  const d = D();
  let h = '<thead><tr><th>일자</th><th>공정구역</th><th>공종</th><th>주요 내용</th><th>상태</th><th></th></tr></thead><tbody id="ed-ms-body">';
  d.milestones.forEach((m,i) => {
    h += `<tr data-row="${i}">
      <td><input type="date" value="${m.date}" data-path="milestones.${i}.date"></td>
      <td><input type="text" value="${m.sub}" data-path="milestones.${i}.sub"></td>
      <td><input type="text" value="${m.공종}" data-path="milestones.${i}.공종"></td>
      <td><input type="text" value="${escAttr(m.title)}" data-path="milestones.${i}.title"></td>
      <td><select data-path="milestones.${i}.status">
        <option ${m.status==='완료'?'selected':''}>완료</option>
        <option ${m.status==='착수'?'selected':''}>착수</option>

function escAttr(s) { return String(s).replace(/"/g, '&quot;'); }

function addMilestoneRow() {
  D().milestones.push({ date: '2026-04-01', sub: '육상-기계', 공종: '기계', title: '신규 마일스톤', status: '착수' });
  renderMilestonesTable();
}
function addPlanRow() {
  D().next_month_plan.push({ date: '2026-05-01', 공종: '기계', title: '신규 계획' });
  renderPlanTable();
}
function delRow(arr, i) {
  if (!confirm('해당 행을 삭제하시겠습니까?')) return;
  D()[arr].splice(i, 1);
  if (arr === 'milestones') renderMilestonesTable();
  else renderPlanTable();
}

function toggleSection(header) {
  header.parentElement.classList.toggle('collapsed');
}

function setByPath(obj, path, val) {
  const keys = path.split('.');
  let cur = obj;
  for (let i = 0; i < keys.length - 1; i++) {
    cur = cur[keys[i]];
  }
  cur[keys[keys.length - 1]] = val;
}

function applyEdits() {
  if (!requireEditAuth()) return;
  // 편집 패널 내의 모든 data-path 소스 (table.editable + .ms-field) 를 수집
  const edPanel = document.querySelector('.panel[data-tab="editor"]');
  const root = edPanel || document;
  root.querySelectorAll('input[data-path], select[data-path]').forEach(el => {
    let v = el.value;
    if (el.type === 'number') v = (v === '' ? null : parseFloat(v));
    setByPath(D(), el.dataset.path, v);
  });
  persistDashboardData();
  // Re-render any open chart panels
  for (const k of openTabs) {
    if (PANEL_INIT[k] && k !== 'editor') {
      const panel = document.querySelector(`.panel[data-tab="${k}"]`);
      if (panel) {
        panel.innerHTML = PANELS[k]();
        setTimeout(() => PANEL_INIT[k](), 30);
      }
    }
  }
  showToast('✅ 변경사항이 적용되었습니다');
  setStatus('데이터 갱신 완료');
}

function exportData() {
  const blob = new Blob([JSON.stringify(D(), null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `dashboard_data_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('💾 JSON 파일이 다운로드 되었습니다');
}

function importData(ev) {
  if (!requireEditAuth()) { ev.target.value = ''; return; }
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      window.DASHBOARD_DATA = data;
      persistDashboardData();
      // 모든 열린 탭 새로고침 (편집 탭이 열려 있으면 표도 갱신)
      for (const k of openTabs) {
        const panel = document.querySelector(`.panel[data-tab="${k}"]`);
        if (!panel) continue;
        panel.innerHTML = PANELS[k]();
        setTimeout(() => PANEL_INIT[k] && PANEL_INIT[k](), 30);
      }
      showToast('📥 JSON 데이터가 로드되어 적용되었습니다');
    } catch (err) {
      alert('JSON 파일 읽기 실패: ' + err.message);
    }
  };
  reader.readAsText(file);
  ev.target.value = '';
}

function resetData() {
  if (!requireEditAuth()) return;
  if (!confirm('초기 데이터로 복원하시겠습니까? 현재 변경사항이 모두 사라집니다.')) return;
  window.DASHBOARD_DATA = JSON.parse(JSON.stringify(_ORIGINAL_DATA));
  localStorage.removeItem(DASHBOARD_STORAGE_KEY);
  // 편집 테이블이 열려 있으면 갱신
  const editPanel = document.querySelector('.panel[data-tab="editor"]');
  if (editPanel) renderEditorTables();
  // 모든 열린 탭 갱신
  for (const k of openTabs) {
    const panel = document.querySelector(`.panel[data-tab="${k}"]`);
    if (!panel || k === 'editor') continue;
    panel.innerHTML = PANELS[k]();
    setTimeout(() => PANEL_INIT[k] && PANEL_INIT[k](), 30);
  }
  showToast('↻ 초기값으로 복원되었습니다');
}
